services:

  postgres:
    image: postgres:18-alpine
    container_name: pivot-postgres
    environment:
      POSTGRES_DB: pivot_dev
      POSTGRES_USER: pivot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pivot_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pivot -d pivot_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pivot-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: pivot-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI web (http://localhost:8025)
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    restart: unless-stopped

volumes:
  postgres_data:
