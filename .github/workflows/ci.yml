name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------
  # 1. QUALITE CODE - BACKEND JAVA
  # -----------------------------------------
  quality-backend:
    name: Code Quality - Java
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Java + Maven
        uses: ./.github/actions/setup
        with:
          java-version: '25'

      - name: Compile + Checkstyle + SpotBugs
        run: mvn --no-transfer-progress compile checkstyle:check spotbugs:check -Dmaven.compiler.release=24

  # -----------------------------------------
  # 2. TESTS BACKEND (TU + TI)
  # -----------------------------------------
  tests-backend:
    name: Tests Backend (TU + TI)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      # PostgreSQL is supplied by Testcontainers (AbstractIntegrationTest @ServiceConnection).
      # Only Redis remains as an external CI service.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Java + Maven
        uses: ./.github/actions/setup
        with:
          java-version: '25'

      - name: Run tests with coverage
        env:
          # Datasource is provided by Testcontainers (@ServiceConnection) — no static URL needed.
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379
        run: mvn --no-transfer-progress verify -Pcoverage -Dmaven.compiler.release=24

      # Compiled classes + coverage shared with the sonar job (no recompile downstream).
      # Multi-module build: classes land in starter/, agilite/, collaboratif/ and app/ subdirs
      # (artifactIds pivot-core-starter / pivot-agilite / pivot-collaboratif / pivot-core-app).
      # agilite/ and collaboratif/ were missing here until EN53 Vague 1/2 gate investigation
      # (2026-07-18): the sonar job only ever saw starter+app target dirs, so SonarCloud had no
      # jacoco.xml for the ~30k absorbed lines and reported new_coverage=0.0% on #226/#227 even
      # though both modules' tests run and pass — the reports were simply never uploaded.
      - name: Upload backend build (classes + coverage)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-build
          path: |
            starter/target/classes/
            starter/target/test-classes/
            starter/target/site/jacoco/jacoco.xml
            agilite/target/classes/
            agilite/target/test-classes/
            agilite/target/site/jacoco/jacoco.xml
            collaboratif/target/classes/
            collaboratif/target/test-classes/
            collaboratif/target/site/jacoco/jacoco.xml
            app/target/classes/
            app/target/test-classes/
            app/target/site/jacoco/jacoco.xml
            agilite/target/classes/
            agilite/target/test-classes/
            agilite/target/site/jacoco/jacoco.xml
          retention-days: 1

  # -----------------------------------------
  # 3. SONARCLOUD (CI analysis — Automatic Analysis désactivée côté projet)
  # -----------------------------------------
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [tests-backend]
    timeout-minutes: 15
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Java + Maven
        uses: ./.github/actions/setup
        with:
          java-version: '25'

      - name: Download backend build (classes + coverage)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: backend-build
          path: .

      - name: SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn --no-transfer-progress sonar:sonar \
            -Dmaven.compiler.release=24 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=pivot-platform \
            -Dsonar.projectKey=PIVOT-PLATFORM_pivot-core \
            -Dsonar.token="${SONAR_TOKEN}"

  # -----------------------------------------
  # 4. SCA - AUDIT DEPENDANCES (Trivy)
  # -----------------------------------------
  sca:
    name: SCA - Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Trivy - Maven pom.xml
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          format: sarif
          output: trivy-backend.sarif
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always() && hashFiles('trivy-backend.sarif') != ''
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-sca-backend

  # -----------------------------------------
  # 5. VALIDATION — docker-compose.prod.yml (EN07.1)
  #    Ne construit ni ne démarre rien (pas de daemon Docker nécessaire pour `config`) —
  #    valide juste que le fichier parse, que les secrets/env requis sont bien exigés
  #    (fail-fast), et que chaque service a bien un healthcheck + pas de port hôte publié
  #    pour les backends/données.
  # -----------------------------------------
  compose-validate:
    name: Validate docker-compose.prod.yml
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Compose config — dummy secrets/env (fail-fast on missing required vars)
        run: |
          set -euo pipefail
          mkdir -p secrets
          for f in postgres_password mail_password otp_secret; do
            echo "dummy-ci-value" > "secrets/${f}.txt"
          done
          export SMTP_HOST=smtp.ci.invalid SMTP_USERNAME=ci@pivot.invalid \
            PIVOT_MAIL_FROM=ci@pivot.invalid PIVOT_APP_URL=https://ci.invalid \
            CORS_ALLOWED_ORIGINS=https://ci.invalid \
            TLS_CERT_PATH=/ci/dummy.crt TLS_KEY_PATH=/ci/dummy.key \
            PIVOT_UI_VERSION=0.0.0-ci PIVOT_CORE_VERSION=0.0.0-ci \
            PIVOT_COLLABORATIF_CORE_VERSION=0.0.0-ci
          docker compose -f docker-compose.prod.yml config > /tmp/compose-config.yml
          rm -f secrets/postgres_password.txt secrets/mail_password.txt secrets/otp_secret.txt

      - name: Assert healthchecks present + no host port on backend/data services
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import sys
          import yaml

          with open("/tmp/compose-config.yml") as f:
              config = yaml.safe_load(f)

          services = config["services"]
          errors = []

          for name in ("nginx", "pivot-core", "pivot-collaboratif-core", "postgres", "redis", "activemq", "pgbouncer", "pgbouncer-exporter"):
              svc = services.get(name)
              if svc is None:
                  errors.append(f"missing service: {name}")
                  continue
              if "healthcheck" not in svc:
                  errors.append(f"{name}: no healthcheck defined")

          for name in ("pivot-core", "pivot-collaboratif-core", "postgres", "redis", "activemq", "pgbouncer", "pgbouncer-exporter"):
              svc = services.get(name, {})
              if svc.get("ports"):
                  errors.append(f"{name}: must not publish a host port (found {svc['ports']})")

          if errors:
              print("Compose validation failed:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)

          print("OK — healthchecks present on nginx/pivot-core/pivot-collaboratif-core/postgres/redis, "
                "no host port on pivot-core/pivot-collaboratif-core/postgres/redis.")
          PY

  # Les jobs réservés aux PR (Mutation PITest + previews Docker/Maven) vivent dans
  # pr-preview.yml (déclenché uniquement on: pull_request) — pour ne pas apparaître en
  # "skipped" sur les runs push (main/develop).
