name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------
  # 1. QUALITE CODE - BACKEND JAVA
  # -----------------------------------------
  quality-backend:
    name: Code Quality - Java
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Java 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Compile + Checkstyle + SpotBugs
        run: mvn --no-transfer-progress compile checkstyle:check spotbugs:check -Dmaven.compiler.release=24

  # -----------------------------------------
  # 2. TESTS BACKEND (TU + TI)
  # -----------------------------------------
  tests-backend:
    name: Tests Backend (TU + TI)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: pivot_test
          POSTGRES_USER: pivot
          POSTGRES_PASSWORD: pivot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pivot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Java 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run tests with coverage
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/pivot_test
          SPRING_DATASOURCE_USERNAME: pivot
          SPRING_DATASOURCE_PASSWORD: pivot_test
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379
          JWT_SECRET: ci-test-secret-key-for-pivot-application-tests-must-be-at-least-64-chars
        run: mvn --no-transfer-progress verify -Pcoverage -Dmaven.compiler.release=24

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-coverage
          path: target/site/jacoco/jacoco.xml

  # -----------------------------------------
  # 3. SONARCLOUD
  # -----------------------------------------
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [tests-backend]
    timeout-minutes: 15
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Java 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Download backend coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: backend-coverage
          path: target/site/jacoco/

      - name: Compile (sonar.java.binaries)
        run: mvn --no-transfer-progress compile -DskipTests -Dmaven.compiler.release=24

      - name: SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn --no-transfer-progress sonar:sonar \
            -Dmaven.compiler.release=24 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=pivot-platform \
            -Dsonar.token="${SONAR_TOKEN}"

  # -----------------------------------------
  # 4. SCA - AUDIT DEPENDANCES (Trivy)
  # -----------------------------------------
  sca:
    name: SCA - Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Trivy - Maven pom.xml
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          format: sarif
          output: trivy-backend.sarif
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always() && hashFiles('trivy-backend.sarif') != ''
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-sca-backend
