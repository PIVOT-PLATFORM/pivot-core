name: E2E

on:
  workflow_dispatch:  # relance manuelle uniquement â€” E2E automatique gÃ©rÃ© par ci.yml

permissions: read-all

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: pivot_e2e
          POSTGRES_USER: pivot
          POSTGRES_PASSWORD: pivot_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pivot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend
        working-directory: backend
        run: mvn --no-transfer-progress package -DskipTests

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        env:
          PIVOT_API_URL: http://localhost:8080
        run: npm run build -- --configuration production

      - name: Start backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/pivot_e2e
          SPRING_DATASOURCE_USERNAME: pivot
          SPRING_DATASOURCE_PASSWORD: pivot_e2e
          SPRING_REDIS_HOST: localhost
          JWT_SECRET: ci-e2e-secret-key-pivot
        run: java -jar backend/target/*.jar &

      - name: Wait for backend
        run: curl --retry 20 --retry-delay 3 --retry-connrefused --silent --output /dev/null http://localhost:8080/actuator/health

      - name: Run Playwright (Chromium)
        working-directory: frontend
        env:
          PIVOT_API_URL: http://localhost:8080
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
