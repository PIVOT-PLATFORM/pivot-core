name: E2E

# Tests E2E Playwright deplaces vers pivot-ui.
# Ce workflow est desactive dans pivot-core (backend ne contient pas les specs Playwright).
# Voir : https://github.com/ApoSkunz/pivot-ui/.github/workflows/e2e.yml
on:
  workflow_dispatch:
    inputs:
      note:
        description: 'Ce workflow est desactive - voir pivot-ui pour les tests E2E'
        required: false

permissions: read-all

jobs:
  notice:
    name: E2E deplaces vers pivot-ui
    runs-on: ubuntu-latest
    steps:
      - name: Notice
        run: |
          echo "Les tests E2E Playwright sont dans le repo pivot-ui."
          echo "Ce workflow n'execute rien dans pivot-core."
