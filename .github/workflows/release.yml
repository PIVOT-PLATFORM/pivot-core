name: Release

on:
  push:
    branches: [main]

permissions: read-all

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      attestations: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Semantic Release
        run: npm install --save-dev semantic-release @semantic-release/changelog @semantic-release/git

      - name: Setup Java 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Setup Node.js 24 (frontend)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend
        working-directory: backend
        run: mvn --no-transfer-progress package -DskipTests

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build -- --configuration production

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker images
        run: |
          docker build -t ghcr.io/${{ github.repository }}/pivot-backend:${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}/pivot-backend:latest \
            backend/
          docker build -t ghcr.io/${{ github.repository }}/pivot-frontend:${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}/pivot-frontend:latest \
            frontend/
          docker push ghcr.io/${{ github.repository }}/pivot-backend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/pivot-backend:latest
          docker push ghcr.io/${{ github.repository }}/pivot-frontend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/pivot-frontend:latest

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: npx semantic-release

      - name: Compute build checksums (SLSA provenance)
        run: |
          find backend/target -name "*.jar" -not -name "*-sources.jar" \
            -exec sha256sum {} \; > build-checksums.txt
          find frontend/dist -type f -name "*.js" -o -name "*.css" \
            | sort | xargs sha256sum >> build-checksums.txt
          echo "Checksums generated:"
          cat build-checksums.txt

      - name: Scan Docker images â€” Trivy
        uses: aquasecurity/trivy-action@b2933f565dbc598b29947660e66259e3c7bc8561 # v0.20.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/pivot-backend:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-container

      - name: Generate SLSA provenance (L2)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: 'build-checksums.txt'
