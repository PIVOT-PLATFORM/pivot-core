name: Release

on:
  push:
    branches: [main]

permissions: read-all

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      attestations: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Setup Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Semantic Release
        run: npm install --save-dev semantic-release @semantic-release/changelog @semantic-release/git

      - name: Setup Java 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn --no-transfer-progress package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image (amd64 + arm64)
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ghcr.io/${{ github.repository }}/pivot-core:${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}/pivot-core:latest \
            --push .

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: npx semantic-release

      - name: Compute build checksums (SLSA provenance)
        run: |
          find target -name "*.jar" -not -name "*-sources.jar" \
            -exec sha256sum {} \; > build-checksums.txt
          echo "Checksums generated:"
          cat build-checksums.txt

      - name: Scan Docker image - Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/pivot-core:${{ github.sha }}
          format: sarif
          output: trivy-core.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always()
        with:
          sarif_file: trivy-core.sarif
          category: trivy-container

      - name: Generate SLSA provenance (L2)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: 'build-checksums.txt'
