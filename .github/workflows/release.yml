name: Release

on:
  push:
    branches: [main]

permissions: read-all

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      attestations: write
      packages: write
      security-events: write   # requis par "Upload Trivy SARIF" (codeql-action/upload-sarif)

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          # Pas de "cache: npm" : aucun package-lock.json n'est versionné (semantic-release est
          # installé à la volée). Le cache npm exigerait un lockfile et faisait échouer le job
          # ("Dependencies lock file is not found").

      - name: Install Semantic Release
        run: npm install --save-dev semantic-release @semantic-release/changelog @semantic-release/git

      - name: Setup Java + Maven
        uses: ./.github/actions/setup-java

      - name: Build
        run: mvn --no-transfer-progress package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # amd64 uniquement : le Dockerfile compile Maven DANS l'image. Un build arm64 sur
      # runner amd64 exigerait l'émulation QEMU d'une compilation JVM complète — lent et
      # sujet au timeout 30 min. Les serveurs cibles sont amd64. Pour réintroduire arm64 :
      # ajouter docker/setup-qemu-action ET refactorer le Dockerfile pour copier un jar
      # pré-construit (pas de compilation émulée).
      - name: Build & push Docker image (amd64)
        run: |
          # GHCR exige un nom de dépôt en minuscules ; github.repository contient PIVOT-PLATFORM.
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}/pivot-core"
          echo "IMAGE_REF=${IMAGE}:${GITHUB_SHA}" >> "$GITHUB_ENV"
          docker buildx build --platform linux/amd64 \
            -t "${IMAGE}:${GITHUB_SHA}" \
            -t "${IMAGE}:latest" \
            --push .

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: npx semantic-release

      - name: Compute build checksums (SLSA provenance)
        run: |
          find target -name "*.jar" -not -name "*-sources.jar" \
            -exec sha256sum {} \; > build-checksums.txt
          echo "Checksums generated:"
          cat build-checksums.txt

      - name: Scan Docker image - Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: sarif
          output: trivy-core.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always() && hashFiles('trivy-core.sarif') != ''
        with:
          sarif_file: trivy-core.sarif
          category: trivy-container

      - name: Generate SLSA provenance (L2)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: 'build-checksums.txt'

  # -----------------------------------------
  # 2. PUBLISH — Maven artifact → GitHub Packages
  # -----------------------------------------
  publish:
    name: Publish Maven artifact
    runs-on: ubuntu-latest
    needs: [release]
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Java 25 (GitHub Packages)
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Deploy to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn --no-transfer-progress deploy -DskipTests -Dmaven.compiler.release=24

  # -----------------------------------------
  # 3. DEPLOY — placeholder (environment: production)
  # -----------------------------------------
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [publish]
    timeout-minutes: 15
    environment: production
    permissions:
      contents: read

    steps:
      - name: Deploy (TODO)
        run: echo "TODO — brancher ici le déploiement (SSH + docker compose, Kubernetes, etc.)"
