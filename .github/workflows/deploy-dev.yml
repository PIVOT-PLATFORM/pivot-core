name: Deploy (recette, continuous)

# Continuous deploy to the managed-min Cloud Run recette env: on every push to
# main (and on demand), build + scan the image, push it to Artifact Registry by
# immutable commit SHA, and notify the pivot-infra orchestrator to roll it out
# by digest. Decoupled from the formal versioned release (release.yml).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions: read-all

concurrency:
  group: deploy-dev-pivot-core
  cancel-in-progress: true

jobs:
  build-deploy:
    name: Build, scan, push to AR & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write   # WIF
    env:
      SHA_TAG: ${{ github.sha }}
    steps:
      # Le build Docker est auto-contenu : le Dockerfile compile lui-même le
      # multi-module Maven dans son stage `builder` (mvnw package -DskipTests),
      # donc pas de setup-java ni de mvn ni de creds GitHub Packages ici (ISO
      # release.yml, dont le `mvn package` ne sert qu'au deploy Maven / SLSA, PAS
      # au build de l'image). fetch-depth: 0 : le Dockerfile copie `.git/` pour
      # git-commit-id-maven-plugin (SHA réel dans /actuator/info) — même pin que
      # release.yml.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # Build the image LOCALLY (so Trivy can gate before any push). Match the
      # Dockerfile context/flags release.yml uses (root `.` context, no build-args).
      - name: Build image (load)
        run: |
          docker buildx build --platform linux/amd64 --load \
            -t "local/pivot-core:${SHA_TAG}" \
            .

      # format: table (not sarif) — this workflow has no code-scanning consumer for a SARIF
      # file, so a sarif-format scan produces literally no visible output when it fails
      # (this exact gate has now failed 7 times across pivot-core PRs/deploys this sprint
      # with zero diagnosable output each time, always unreproducible on a fresh local
      # rescan of the same commit). table prints the actual CVE/package to the job log on
      # failure, so a future recurrence is finally diagnosable instead of a silent black box.
      - name: Scan image - Trivy (gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: local/pivot-core:${{ env.SHA_TAG }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Authenticate to GCP (keyless / WIF)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Push to Artifact Registry (by SHA) & resolve digest
        id: push
        run: |
          gcloud auth configure-docker "${{ vars.AR_HOST }}" --quiet
          docker tag "local/pivot-core:${SHA_TAG}" "${{ vars.AR_IMAGE }}:${SHA_TAG}"
          PUSH_OUT=$(docker push "${{ vars.AR_IMAGE }}:${SHA_TAG}" 2>&1); printf '%s\n' "$PUSH_OUT"
          DIGEST=$(printf '%s\n' "$PUSH_OUT" | grep -oE 'sha256:[a-f0-9]{64}' | tail -1)
          if [ -z "$DIGEST" ]; then echo "::error::no digest after AR push"; exit 1; fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Notify orchestrator (deploy by digest)
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.ORCHESTRATOR_DISPATCH_TOKEN }}
          repository: PIVOT-PLATFORM/pivot-infra
          event-type: deploy-service
          client-payload: |
            {"service": "pivot-core", "image": "${{ vars.IMAGE }}", "digest": "${{ steps.push.outputs.digest }}", "version": "dev-${{ github.sha }}"}
