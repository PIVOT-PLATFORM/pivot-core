sonar.projectKey=PIVOT-PLATFORM_PIVOT
sonar.organization=pivot-platform
sonar.projectName=PIVOT-PLATFORM_PIVOT

# Sources — paths relatifs au basedir Maven (working-directory: backend/)
sonar.sources=src/main/java,../frontend/src
sonar.tests=src/test/java

# Java
sonar.java.binaries=target/classes
sonar.java.source=24

# Coverage
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.javascript.lcov.reportPaths=../frontend/coverage/lcov.info

# Exclusions
sonar.exclusions=\
  **/generated/**,\
  **/*.spec.ts,\
  **/node_modules/**,\
  src/main/resources/**,\
  ../frontend/dist/**

sonar.test.exclusions=\
  **/node_modules/**,\
  ../frontend/dist/**

# Encoding
sonar.sourceEncoding=UTF-8
