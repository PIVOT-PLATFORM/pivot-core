name: Lighthouse

on:
  push:
    branches: [main]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI - Perf & Accessibilite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    permissions:
      contents: read
      statuses: write

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: pivot_lighthouse
          POSTGRES_USER: pivot
          POSTGRES_PASSWORD: pivot_lighthouse
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pivot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Java 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build backend
        working-directory: backend
        run: mvn --no-transfer-progress package -DskipTests

      - name: Start backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/pivot_lighthouse
          SPRING_DATASOURCE_USERNAME: pivot
          SPRING_DATASOURCE_PASSWORD: pivot_lighthouse
          SPRING_REDIS_HOST: localhost
          JWT_SECRET: ci-lighthouse-audit-secret-key-for-pivot-application-perf-testing-must-be-64-chars-x
          SERVER_PORT: 8080
        run: java -jar backend/target/*.jar &

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Angular (production)
        working-directory: frontend
        env:
          PIVOT_API_URL: http://localhost:8080
        run: npm run build -- --configuration production

      - name: Wait for backend
        run: curl --retry 20 --retry-delay 3 --retry-connrefused --silent --output /dev/null http://localhost:8080/actuator/health

      - name: Serve Angular build
        run: |
          npx http-server frontend/dist/pivot-frontend/browser -p 4200 --silent &
          sleep 3

      - name: Install Chrome
        uses: browser-actions/setup-chrome@c785b87e244131f27c9f19c1a33e2ead956ab7ce # v1
        id: setup-chrome

      - name: Run Lighthouse CI
        env:
          LHCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          npx lhci autorun
          npx lhci upload --target=filesystem --outputDir=./lighthouse-reports || true

      - name: Lighthouse - resume agrege
        if: always()
        run: |
          echo "## Lighthouse CI - Resultats PIVOT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Page | Perf | A11y | Bonnes pratiques | SEO |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|------------------|-----|" >> $GITHUB_STEP_SUMMARY
          for f in $(find lighthouse-reports -name "lhr-*.json" 2>/dev/null); do
            [ -f "$f" ] || continue
            url=$(jq -r '.finalUrl' "$f")
            perf=$(jq -r '(.categories.performance.score // 0) * 100 | round | tostring' "$f")
            a11y=$(jq -r '(.categories.accessibility.score // 0) * 100 | round | tostring' "$f")
            bp=$(jq -r '(.categories["best-practices"].score // 0) * 100 | round | tostring' "$f")
            seo=$(jq -r '(.categories.seo.score // 0) * 100 | round | tostring' "$f")
            echo "| $url | ${perf}% | ${a11y}% | ${bp}% | ${seo}% |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: lighthouse-report
          path: lighthouse-reports/
          retention-days: 7
