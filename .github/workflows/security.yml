name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'   # Lundi 6h UTC

permissions: read-all

jobs:
  # 
  # SECRETS  Gitleaks
  # 
  gitleaks:
    name: Gitleaks  Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENCE_KEY }}
          GITLEAKS_CONFIG: .github/workflows/configuration/.gitleaks.toml

  # 
  # SAST  CodeQL (Java + Angular)
  # -----------------------------------------
  codeql:
    name: CodeQL - SAST
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      matrix:
        language: [java, javascript]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Java 25 (Java matrix)
        if: matrix.language == 'java'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}

      - name: Build backend (Java matrix)
        if: matrix.language == 'java'
        working-directory: backend
        run: mvn --no-transfer-progress compile -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4

  # -----------------------------------------
  # SAST - Semgrep (OWASP + Java + Angular)
  # -----------------------------------------
  semgrep:
    name: Semgrep - SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Semgrep Scan
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: >-
            p/java
            p/spring
            p/owasp-top-ten
            p/security-audit
            p/jwt
            p/sql-injection
            p/xss
            p/command-injection
            p/secrets
            p/javascript
            p/typescript

  # -----------------------------------------
  # CI/CD CONFORMITE - Plumber
  # -----------------------------------------
  plumber:
    name: Plumber - CI/CD Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Plumber v0.3.0
        run: |
          curl -sSL https://github.com/getplumber/plumber/releases/download/v0.3.0/plumber-linux-amd64 \
            -o /usr/local/bin/plumber
          chmod +x /usr/local/bin/plumber

      - name: Run Plumber scan
        run: plumber scan --config .github/workflows/configuration/plumber.yaml --format sarif --output plumber-results.sarif
        continue-on-error: true

      - name: Upload Plumber SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always() && hashFiles('plumber-results.sarif') != ''
        with:
          sarif_file: plumber-results.sarif
          category: plumber-cicd

      - name: Plumber report (text)
        run: plumber scan --config .github/workflows/configuration/plumber.yaml
