name: DAST â€” Baseline Scan (prod)

# Scan ZAP sur l'URL de production PIVOT dÃ©ployÃ©e.
# Non bloquant â€” crÃ©e une issue GitHub si des alertes sont trouvÃ©es.

on:
  schedule:
    - cron: '0 3 1 * *'  # 1er de chaque mois, 03h00 UTC
  workflow_dispatch:

permissions: read-all

jobs:
  zap-baseline:
    name: ZAP Baseline â€” prod PIVOT
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Grant ZAP container write access to workspace
        run: chmod a+w "$GITHUB_WORKSPACE"

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ secrets.PIVOT_PROD_URL }}
          rules_file_name: '.github/workflows/configuration/zap-rules.tsv'
          fail_action: false
          issue_title: '[DAST] ZAP Baseline â€” alertes de sÃ©curitÃ© PIVOT'
          token: ${{ secrets.GITHUB_TOKEN }}
          artifact_name: zap-baseline-${{ github.run_number }}
