name: Mutation Testing

on:
  push:
    branches: [main]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  mutation:
    name: PIT â€” Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # Non bloquant â€” indicateur de qualitÃ© des tests, ne bloque pas le merge
    continue-on-error: true
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: pivot_mutation
          POSTGRES_USER: pivot
          POSTGRES_PASSWORD: pivot_mutation
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pivot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Java 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Compile & run unit tests (base coverage pour PIT)
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/pivot_mutation
          SPRING_DATASOURCE_USERNAME: pivot
          SPRING_DATASOURCE_PASSWORD: pivot_mutation
          SPRING_REDIS_HOST: localhost
          JWT_SECRET: ci-mutation-secret-key
        run: |
          mvn --no-transfer-progress test \
            -Dspring.profiles.active=test

      - name: Run PIT Mutation Testing
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/pivot_mutation
          SPRING_DATASOURCE_USERNAME: pivot
          SPRING_DATASOURCE_PASSWORD: pivot_mutation
          JWT_SECRET: ci-mutation-secret-key
        run: |
          mvn --no-transfer-progress org.pitest:pitest-maven:mutationCoverage \
            -DmutationThreshold=60 \
            -DcoverageThreshold=60 \
            -Dthreads=4 \
            -DoutputFormats=HTML,XML \
            || true

      - name: Upload PIT report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pitest-report
          path: backend/target/pit-reports/
          retention-days: 14
