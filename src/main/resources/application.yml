spring:
  application:
    name: pivot-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pivot}
    username: ${SPRING_DATASOURCE_USERNAME:pivot}
    # EN07.2 — Docker secret en prod : ${SECRET_FILE_PATH}/secret.datasource-password (cf.
    # application-prod.yml + docs/deployment/secret-management.md). Le relaxed binding Spring
    # Boot fait déjà gagner SPRING_DATASOURCE_PASSWORD sur une valeur en dur sans placeholder —
    # le rôle du placeholder ici n'est pas d'activer cette précédence (déjà acquise), mais
    # d'ouvrir un second niveau de repli vers secret.datasource-password quand la variable
    # d'env est absente. Ordre effectif : env var (dev/compose) > Docker secret (prod) >
    # défaut local "pivot".
    password: ${SPRING_DATASOURCE_PASSWORD:${secret.datasource-password:pivot}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  data:
    redis:
      # Valeurs par défaut : overridées via SPRING_DATA_REDIS_HOST / SPRING_DATA_REDIS_PORT
      # par le relaxed binding Spring Boot (Spring Boot 4.x, pas de placeholder ${...} nécessaire).
      host: localhost
      port: 6379
      # EN07.2 — vide par défaut (pas d'AUTH Redis en dev, équivalent à une clé absente —
      # RedisPassword.of("") == RedisPassword.none()). Placeholder à deux niveaux comme
      # spring.datasource.password ci-dessus : ouvre le repli vers secret.redis-password
      # (Docker secret prod) quand SPRING_DATA_REDIS_PASSWORD est absent — voir
      # docs/deployment/secret-management.md.
      password: ${SPRING_DATA_REDIS_PASSWORD:${secret.redis-password:}}

  messages:
    basename: messages
    encoding: UTF-8
    use-code-as-default-message: false
    fallback-to-system-locale: false

  jackson:
    deserialization:
      # Jackson 3.x flipped this default to false (silently ignore unknown JSON properties) —
      # explicitly re-enabled: a spoofed field (e.g. userId/tenantId/accountId smuggled into an
      # /api/account/* or /api/admin/* request body) must be rejected with 400, never silently
      # dropped. Verified by AccountControllerIntegrationTest (US02.2.1). Per-DTO
      # @JsonIgnoreProperties(ignoreUnknown = false) does NOT reliably override this Jackson 3.x
      # mapper-level default — the global setting is the only lever that works.
      fail-on-unknown-properties: true

  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    # EN07.2 — repli vers ${SECRET_FILE_PATH}/secret.mail-password (Docker secret prod) quand
    # SPRING_MAIL_PASSWORD est absent — même mécanisme qu'au-dessus (spring.datasource.password).
    password: ${SPRING_MAIL_PASSWORD:${secret.mail-password:}}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  servlet:
    multipart:
      # US02.1.1 — avatar upload. Capped slightly above the 2 MB application-level limit
      # (AvatarStorageService) so oversized-but-plausible uploads hit our own clean
      # AVATAR_TOO_LARGE 400 rather than the generic servlet-level rejection in the common case.
      max-file-size: 3MB
      max-request-size: 3MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  # Honour X-Forwarded-For ONLY when the immediate peer is a trusted reverse proxy.
  # Enables Tomcat RemoteIpValve so HttpServletRequest.getRemoteAddr() returns the real
  # client IP behind nginx, while a directly-reachable attacker cannot spoof XFF to bypass
  # per-IP rate limiting or poison the audit trail. internal-proxies defaults to private +
  # loopback ranges; override PIVOT_TRUSTED_PROXIES to match the prod proxy network.
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
      internal-proxies: ${PIVOT_TRUSTED_PROXIES:10\.\d{1,3}\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3}|172\.(1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}|127\.\d{1,3}\.\d{1,3}\.\d{1,3}|::1|0:0:0:0:0:0:0:1}

management:
  # EN04.2 — port de management séparé, non routé par nginx (voir docker-compose.prod.yml,
  # EN07.1). Spring Boot n'expose alors les endpoints Actuator QUE sur ce port : ils
  # disparaissent de :8080/api, et server.servlet.context-path (/api) ne s'applique pas à ce
  # second connecteur — le chemin réel est bien http://localhost:8081/actuator/health, jamais
  # /api/actuator/health (contrairement à l'ancien comportement, port partagé). Voir README.md.
  server:
    port: ${MANAGEMENT_SERVER_PORT:8081}
  endpoints:
    web:
      # health,info,metrics,prometheus (principe de moindre exposition) — pas de wildcard `*`.
      # `prometheus` réintégré par EN04.3 : micrometer-registry-prometheus est désormais sur le
      # classpath (pom.xml), PrometheusMetricsExportAutoConfiguration peut donc s'activer.
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      # Spring Boot réutilise tel quel le SecurityFilterChain assemblé du contexte principal
      # comme filtre du contexte enfant de management dès qu'il en détecte un
      # (ServletManagementChildContextConfiguration, @ConditionalOnBean ancestor) — d'où le
      # permitAll("/actuator/**") dans SecurityConfig (voir son Javadoc) plutôt qu'une config
      # dédiée ici. L'isolation réseau Docker (réseau interne, aucun port publié — EN07.1) est
      # le SEUL contrôle d'accès voulu sur ce port, jamais une authentification applicative :
      # `when_authorized` masquerait donc systématiquement le détail (aucun principal
      # authentifié n'existe jamais sur ce port) — sans intérêt ici. `always` expose le détail
      # par composant (DB, Redis) à quiconque atteint :8081, ce qui est acceptable puisque ce
      # port n'est, par conception, jamais atteignable hors du réseau Docker interne.
      show-details: always
      probes:
        # EN04.4 — active explicitement les groupes "liveness"/"readiness". Spring Boot les
        # active déjà par défaut hors Kubernetes (AvailabilityProbesAutoConfiguration,
        # `@ConditionalOnBooleanProperty(matchIfMissing = true)` — vérifié dans le jar
        # spring-boot-health 4.1.0, aucune condition Kubernetes trouvée) : cette ligne ne
        # change donc rien au comportement, elle documente l'intention et protège d'un futur
        # changement de défaut Spring Boot qui la rendrait implicite différemment.
        enabled: true
      group:
        # readinessState seul (comportement Spring Boot par défaut) ne reflète que l'état
        # applicatif interne (ApplicationAvailability) — jamais REFUSING_TRAFFIC de lui-même
        # tant que rien ne le déclenche explicitement. On y ajoute les dépendances externes
        # dont ce service a réellement besoin pour servir du trafic : "db" (connexion
        # PostgreSQL, DataSourceHealthContributorAutoConfiguration), "redis" (cache statut
        # activation module, DataRedisHealthContributorAutoConfiguration) et "flyway" (bean
        # custom FlywayHealthIndicator — aucun contributeur Flyway natif dans Spring Boot 4.1,
        # vérifié : `spring-boot-flyway`/`spring-boot-actuator-autoconfigure`/
        # `spring-boot-autoconfigure` n'en embarquent aucun).
        readiness:
          include: readinessState,db,redis,flyway
        # livenessState seul : uniquement "le process JVM répond-il ?", jamais les dépendances
        # externes — une panne Redis/DB transitoire doit faire échouer la readiness (sortir du
        # pool nginx) sans faire échouer la liveness (un redémarrage du conteneur ne répare
        # pas une panne Redis/DB externe ; il ne ferait que perdre l'état JVM en cours pour
        # rien). Explicite ici bien qu'égal au défaut Spring Boot, pour la symétrie avec le
        # groupe readiness ci-dessus et parce que c'est le cœur de l'AC de cet Enabler.
        liveness:
          include: livenessState
  metrics:
    distribution:
      percentiles-histogram:
        # Prometheus-native histogram buckets, not Micrometer client-side percentiles (the
        # latter don't aggregate correctly across instances/scrapes). p50/p95/p99 per
        # endpoint are computed PromQL-side:
        # histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, uri))
        http.server.requests: true
  # info.git.mode reste au défaut Spring Boot ("simple", pas de surcharge ici) — expose
  # uniquement branch + commit.id (abrégé) + commit.time, qui satisfait déjà l'AC "git commit
  # sha". `full` republierait l'intégralité brute de git.properties sous /actuator/info,
  # committer/auteur email et message de commit complet inclus (git.build.user.email,
  # git.commit.user.email, git.commit.message.full) — à l'opposé du principe de moindre
  # exposition déjà appliqué juste au-dessus pour le choix des endpoints exposés.

logging:
  level:
    fr.pivot: ${LOG_LEVEL_PIVOT:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
    org.springframework.web: ${LOG_LEVEL_WEB:WARN}
    org.flywaydb: ${LOG_LEVEL_FLYWAY:WARN}

# Politique de robustesse des mots de passe (US01.2.4).
# Liste exhaustive des paramètres — aucun paramètre implicite.
# Exposée au frontend via GET /api/auth/password-policy.
security:
  password:
    min-length: ${SECURITY_PASSWORD_MIN_LENGTH:12}
    min-uppercase: ${SECURITY_PASSWORD_MIN_UPPERCASE:1}
    min-digits: ${SECURITY_PASSWORD_MIN_DIGITS:1}
    min-special: ${SECURITY_PASSWORD_MIN_SPECIAL:1}

pivot:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  mail:
    from: ${PIVOT_MAIL_FROM:noreply@pivot.app}
  app:
    url: ${PIVOT_APP_URL:http://localhost:4200}
    support-email: ${PIVOT_SUPPORT_EMAIL:support@pivot.app}
    owner-mail: ${PIVOT_OWNER_MAIL:${pivot.app.support-email}}
    owner-lang: ${PIVOT_OWNER_LANG:fr}
  auth:
    session-cookie-name: pivot_session
    device-cookie-name: pivot_device
    verification-ttl-hours: 24
    email-change-ttl-hours: 24
    secure-cookie: true
    # EN07.2 — clé HMAC OTP (device / suppression compte). Vide par défaut : CryptoUtils
    # génère une clé éphémère (OTP invalidés au restart, acceptable en dev — TTL courts).
    # Prod : ${SECRET_FILE_PATH}/secret.auth-otp-secret (Docker secret, min 32 caractères).
    otp-secret: ${PIVOT_AUTH_OTP_SECRET:${secret.auth-otp-secret:}}
    # TTL reset mdp, TTL OTP appareil, durée confiance appareil : table feature_flags
  cleanup:
    tokens-cron: "0 0 2 * * *"  # Nightly 02:00 — overridable via env PIVOT_CLEANUP_TOKENS_CRON
  storage:
    avatars:
      # US02.1.1 — local filesystem avatar storage (MVP, self-hostable). Mount a persistent
      # Docker volume at this path in production, or override via PIVOT_AVATAR_STORAGE_PATH.
      base-path: ${PIVOT_AVATAR_STORAGE_PATH:./data/avatars}
  export:
    # RGPD Art. 20 (US02.3.1) — export de données personnelles.
    # Stockage local MVP (chemin configurable, exclu du contrôle de version).
    storage-path: ${PIVOT_EXPORT_STORAGE_PATH:./data/exports}
    rate-limit-hours: ${PIVOT_EXPORT_RATE_LIMIT_HOURS:24}
    download-ttl-hours: ${PIVOT_EXPORT_DOWNLOAD_TTL_HOURS:24}
    cleanup-cron: "0 30 2 * * *"  # Nightly 02:30 — overridable via env PIVOT_EXPORT_CLEANUP_CRON
  tenant:
    # Slug of the tenant hosting ROLE_SUPER_ADMIN accounts (US06.2.2). This tenant can never
    # be deactivated via PATCH /api/superadmin/tenants/{id}/status — configurable rather than
    # a hardcoded id so a self-hosted deployment can rename/re-provision it.
    system-tenant-slug: ${PIVOT_SYSTEM_TENANT_SLUG:pivot-saas}

modules:
  cache:
    # TTL du cache Redis de statut d'activation (module:status:{tenantId}:{moduleId}).
    # Override via MODULES_CACHE_TTL_SECONDS (relaxed binding).
    ttl-seconds: ${MODULES_CACHE_TTL_SECONDS:60}
