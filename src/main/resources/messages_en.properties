# --- Email verification ---
email.verify-email.page-title=Confirm your email — PIVOT
email.verify-email.body=Thank you for signing up on PIVOT. Click the button below to confirm your email address and activate your account.
email.verify-email.cta=Confirm my email
email.verify-email.link-label=Or copy this link into your browser:
email.verify-email.expiry=This link expires in 24 hours. If you didn’t create an account, please ignore this email.

# --- Verification reminder ---
email.verify-reminder.page-title=Reminder — verify your PIVOT account
email.verify-reminder.body=You already have a PIVOT account waiting to be verified. Click the button below to confirm your email address and activate your account.
email.verify-reminder.cta=Verify my email
email.verify-reminder.link-label=Or copy this link into your browser:
email.verify-reminder.expiry=This link expires in 24 hours. If you didn’t make this request, please ignore this email.

# --- Password reset ---
email.reset-password.page-title=Reset your password — PIVOT
email.reset-password.body=You requested a password reset. Click the button below to set a new one.
email.reset-password.cta=Reset my password
email.reset-password.expiry=This link expires in 15 minutes.
email.reset-password.safe=If you didn’t make this request, your account is safe — please ignore this email.

# --- Password changed ---
email.password-changed.page-title=Your password has been changed — PIVOT
email.password-changed.body=Your PIVOT account password has been successfully changed.
email.password-changed.label.date=Date
email.password-changed.label.ip=IP Address
email.password-changed.not-you.title=This wasn’t you?
email.password-changed.not-you.body=Your account may be compromised. Reset your password immediately and contact our support.
email.password-changed.not-you.cta=Secure my account
email.password-changed.date-format=MM/dd/yyyy 'at' HH:mm 'UTC'
email.password-changed.unknown-ip=unknown

# --- Account exists ---
email.account-exists.page-title=You already have an account — PIVOT
email.account-exists.body=A registration attempt was made with this email address, but a PIVOT account already exists. If that was you, please sign in directly. If you forgot your password, reset it.
email.account-exists.cta=Sign in
email.account-exists.forgot-password=Forgot your password?
email.account-exists.safe=If you didn’t make this attempt, you can safely ignore this email.

