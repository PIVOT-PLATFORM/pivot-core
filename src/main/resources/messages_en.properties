# --- Suspicious login alert (US01.4.3a) ---
email.suspicious-login.page-title=Sign-in from an unrecognized device — PIVOT
email.suspicious-login.body=A sign-in just occurred on your PIVOT account from a device we don't recognize.
email.suspicious-login.label.device=Device
email.suspicious-login.label.date=Date
email.suspicious-login.was-you=If this was you, no action is needed.
email.suspicious-login.not-you.title=This sign-in wasn't you?
email.suspicious-login.not-you.body=Confirm it below. A full re-authentication (current password) will be required before anything changes — clicking this link alone does not change your account.
email.suspicious-login.not-you.cta=This wasn't me
email.suspicious-login.expiry=This link expires in 1 hour.
