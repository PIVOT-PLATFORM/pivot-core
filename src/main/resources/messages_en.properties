# --- Email verification ---
email.verify-email.page-title=Confirm your email — PIVOT
email.verify-email.body=Thank you for signing up on PIVOT. Click the button below to confirm your email address and activate your account.
email.verify-email.cta=Confirm my email
email.verify-email.link-label=Or copy this link into your browser:
email.verify-email.expiry=This link expires in 24 hours. If you didn’t create an account, please ignore this email.

# --- Verification reminder ---
email.verify-reminder.page-title=Reminder — verify your PIVOT account
email.verify-reminder.body=You already have a PIVOT account waiting to be verified. Click the button below to confirm your email address and activate your account.
email.verify-reminder.cta=Verify my email
email.verify-reminder.link-label=Or copy this link into your browser:
email.verify-reminder.expiry=This link expires in 24 hours. If you didn’t make this request, please ignore this email.

# --- Password reset ---
email.reset-password.page-title=Reset your password — PIVOT
email.reset-password.body=You requested a password reset. Click the button below to set a new one.
email.reset-password.cta=Reset my password
email.reset-password.expiry=This link expires in 15 minutes.
email.reset-password.safe=If you didn’t make this request, your account is safe — please ignore this email.

# --- Password changed ---
email.password-changed.page-title=Your password has been changed — PIVOT
email.password-changed.body=Your PIVOT account password has been successfully changed.
email.password-changed.label.date=Date
email.password-changed.label.ip=IP Address
email.password-changed.not-you.title=This wasn’t you?
email.password-changed.not-you.body=Your account may be compromised. Reset your password immediately and contact our support.
email.password-changed.not-you.cta=Secure my account
email.password-changed.date-format=MM/dd/yyyy 'at' HH:mm 'UTC'
email.password-changed.unknown-ip=unknown

# --- Account exists ---
email.account-exists.page-title=You already have an account — PIVOT
email.account-exists.body=A registration attempt was made with this email address, but a PIVOT account already exists. If that was you, please sign in directly. If you forgot your password, reset it.
email.account-exists.cta=Sign in
email.account-exists.forgot-password=Forgot your password?
email.account-exists.safe=If you didn’t make this attempt, you can safely ignore this email.

# --- Welcome ---
email.welcome.page-title=Welcome to PIVOT!
email.welcome.tagline=Enterprise collaboration platform
email.welcome.hello=Welcome, {0}! 🎉
email.welcome.body=Your PIVOT account is ready. You can now access the platform and start collaborating with your team.
email.welcome.cta=Access PIVOT
email.welcome.support.before=Questions? Check our
email.welcome.support.link=documentation
email.welcome.support.after=or contact our support.

# --- Device confirmation ---
email.device-confirm.page-title=Sign-in from a new device — PIVOT
email.device-confirm.body=A sign-in attempt was detected from {0}. Enter the code below to verify your identity.
email.device-confirm.otp-label=Verification code
email.device-confirm.expiry=This code expires in 15 minutes.
email.device-confirm.warning=If this wasn’t you, change your password immediately.
email.device-confirm.unknown-device=an unknown device

# --- Personal data export (RGPD Art. 20 — US02.3.1) ---
email.export-ready.page-title=Your data export is ready — PIVOT
email.export-ready.body=Your personal data export request has been processed successfully. Click the button below to download your archive.
email.export-ready.cta=Download my export
email.export-ready.expiry=This link expires in 24 hours.
email.export-ready.safe=If you didn’t request this export, contact our support immediately:

email.export-failed.page-title=Your data export could not be generated — PIVOT
email.export-failed.body=Generating your personal data export failed. Our team has been notified. You can try again from your account page.
email.export-failed.retry=If the problem persists, contact our support:

# --- Account reactivated by an admin (US06.1.5) ---
email.account-reactivated.page-title=Your PIVOT account has been reactivated
email.account-reactivated.body=Your PIVOT account has just been reactivated by an administrator of your organization. You can sign in again.
email.account-reactivated.cta=Sign in
email.account-reactivated.safe=If you weren't expecting this message, contact your administrator.

# --- Contact form (sender confirmation) ---
email.subject.contact-confirmation=Your message has been received — PIVOT
email.contact-confirmation.page-title=Your message has been received — PIVOT
email.contact-confirmation.tagline=Enterprise Collaboration Platform
email.contact-confirmation.heading=Message received!
email.contact-confirmation.body=Thank you for reaching out. The PIVOT team will get back to you as soon as possible.
email.contact-confirmation.message-label=Your message
email.contact-confirmation.footer=This email confirms receipt of your message only. Please do not reply to this email.

# --- Contact form (team notification) ---
email.subject.contact-notification=New contact message — PIVOT
email.contact-notification.page-title=New contact message — PIVOT
email.contact-notification.tagline=New contact message
email.contact-notification.heading=New message received via the contact form
email.contact-notification.from-label=From
email.contact-notification.message-label=Message

# --- Account — change password (US02.2.1) ---
# Anti-enumeration message shared verbatim between the 401 (wrong current password) and the
# 429 (rate limit) of POST /account/password — see AccountPasswordService. Note: this flow
# always resolves the message in French regardless of locale (see AccountPasswordService); this
# English entry exists only to keep the bundle complete/consistent.
account.change-password.auth-failure=Current password incorrect

# --- Account — change email address (US02.2.2) ---
email.email-change-confirm.page-title=Confirm your new email address — PIVOT
email.email-change-confirm.body=You asked to change the email address of your PIVOT account. Click the button below to confirm this new address.
email.email-change-confirm.cta=Confirm my new address
email.email-change-confirm.link-label=Or copy this link into your browser:
email.email-change-confirm.expiry=This link expires in 24 hours and can only be used once.

email.email-changed.page-title=Your email address has been changed — PIVOT
email.email-changed.body=The email address of your PIVOT account has been changed successfully.
email.email-changed.label.old-email=Previous address
email.email-changed.label.new-email=New address
email.email-changed.label.date=Date
email.email-changed.label.ip=IP address
email.email-changed.not-you.title=This wasn't you?
email.email-changed.not-you.body=Your account may be compromised. Reset your password immediately and contact our support.
email.email-changed.not-you.cta=Secure my account

email.email-change-duplicate.page-title=Email change attempt — PIVOT
email.email-change-duplicate.body=An email change request was made on PIVOT using your address. You already have a PIVOT account associated with this address.
email.email-change-duplicate.cta=Sign in
email.email-change-duplicate.forgot-password=Forgot your password?
email.email-change-duplicate.safe=If you did not initiate this request, you can safely ignore this email.

# --- Account — account deletion (US02.2.4, RGPD Art. 17) ---
email.account-deletion-confirm.page-title=Deleting your PIVOT account — confirmation
email.account-deletion-confirm.body=We have received your request to permanently delete your PIVOT account. All your active sessions have been signed out immediately.
email.account-deletion-confirm.label.effective-date=Effective deletion date
email.account-deletion-confirm.grace-period=Until that date, you can cancel this deletion at any time using the link below. After that, your personal data will be irreversibly anonymized.
email.account-deletion-confirm.cta=Cancel the deletion
email.account-deletion-confirm.link-label=Or copy this link into your browser:
email.account-deletion.date-format=MM/dd/yyyy 'at' HH:mm 'UTC'

email.account-deletion-otp.page-title=Account deletion confirmation — PIVOT
email.account-deletion-otp.body=You requested the permanent deletion of your PIVOT account. Enter the code below to confirm this irreversible action.
email.account-deletion-otp.otp-label=Confirmation code
email.account-deletion-otp.expiry=This code expires in 10 minutes.
email.account-deletion-otp.warning=If you didn’t make this request, ignore this email — your account will not be deleted.

email.account-deletion-cancelled.page-title=Account deletion cancelled — PIVOT
email.account-deletion-cancelled.body=The deletion of your PIVOT account has been cancelled. Your account remains active — you will need to sign in again, as your previous sessions were signed out when the deletion was requested.
email.account-deletion-cancelled.cta=Sign in again

