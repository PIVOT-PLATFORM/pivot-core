spring:
  application:
    name: pivot-backend

  # datasource URL/username/password are injected by @ServiceConnection (Testcontainers).
  datasource:
    hikari:
      # Chaque combinaison unique de @Import(...TestModuleConfig...) parmi les classes
      # *IntegrationTest crée un ApplicationContext (et donc un pool HikariCP) distinct, tous
      # contre le même conteneur Testcontainers Postgres — avec le défaut HikariCP
      # (maximum-pool-size = 10) et un nombre croissant de configurations Spring distinctes dans
      # la suite, le total de connexions simultanées peut dépasser max_connections côté Postgres
      # (observé en CI : "FATAL: sorry, too many clients already", à partir d'un certain nombre
      # de classes *IntegrationTest cumulées). Un pool réduit ici suffit largement : Surefire
      # exécute les tests séquentiellement par défaut (pas de parallélisme configuré), 1 seule
      # opération BDD active à la fois par contexte dans l'immense majorité des cas — 3 laisse
      # une marge pour une transaction REQUIRES_NEW imbriquée (voir TaskExecutor synchrone dans
      # AbstractIntegrationTest) sans se rapprocher de la limite serveur.
      maximum-pool-size: 3
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/seeds
    baseline-on-migrate: false

  data:
    redis:
      # Valeurs par défaut : overridées via SPRING_DATA_REDIS_HOST / SPRING_DATA_REDIS_PORT
      # par le relaxed binding Spring Boot (Spring Boot 4.x, pas de placeholder ${...} nécessaire).
      host: localhost
      port: 6379
      # EN04.4 — voir application.yml pour la justification complète (défaut Lettuce 60s,
      # bien trop long pour un health check qui doit échouer vite sur Redis mort).
      timeout: 2s

  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  servlet:
    multipart:
      max-file-size: 3MB
      max-request-size: 3MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:8081}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        # EN04.4 — mêmes groupes qu'en production (voir application.yml pour la justification
        # complète) : readiness inclut les dépendances externes (db, redis, flyway), liveness
        # reste JVM-only.
        readiness:
          include: readinessState,db,redis,flyway
        liveness:
          include: livenessState
  # info.git.mode: défaut Spring Boot ("simple") — voir application.yml.

logging:
  level:
    fr.pivot: DEBUG
    org.springframework.security: INFO
    org.springframework.web: DEBUG
    org.flywaydb: INFO

# Politique de robustesse des mots de passe (US01.2.4) — mêmes défauts qu'en production.
security:
  password:
    min-length: 12
    min-uppercase: 1
    min-digits: 1
    min-special: 1

pivot:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  mail:
    from: ${PIVOT_MAIL_FROM:noreply@pivot.app}
  app:
    url: ${PIVOT_APP_URL:http://localhost:4200}
    support-email: ${PIVOT_SUPPORT_EMAIL:support@pivot.app}
  auth:
    session-cookie-name: pivot_session
    device-cookie-name: pivot_device
    verification-ttl-hours: 24
    email-change-ttl-hours: 24
    secure-cookie: false
    # TTL reset mdp, TTL OTP appareil, durée confiance appareil : table feature_flags
  cleanup:
    tokens-cron: "-"  # disabled in test
  modules:
    # Catalogue vide en test : chaque *IntegrationTest déclare ses propres PivotModule de test
    # via @TestConfiguration/@Bean (auto-découverte, non affectée par ce catalogue statique) —
    # une entrée ici polluerait leurs assertions de compte/liste exact (ex.
    # containsExactlyInAnyOrder) avec un module réel non attendu par le test.
    catalog: []
  storage:
    avatars:
      # Never write into the repo working directory during tests — system temp dir instead.
      base-path: ${java.io.tmpdir:/tmp}/pivot-test-avatars
