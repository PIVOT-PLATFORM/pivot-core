spring:
  application:
    name: pivot-backend

  # datasource URL/username/password are injected by @ServiceConnection (Testcontainers).

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/seeds
    baseline-on-migrate: false

  data:
    redis:
      # Valeurs par défaut : overridées via SPRING_DATA_REDIS_HOST / SPRING_DATA_REDIS_PORT
      # par le relaxed binding Spring Boot (Spring Boot 4.x, pas de placeholder ${...} nécessaire).
      host: localhost
      port: 6379

  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    fr.pivot: DEBUG
    org.springframework.security: INFO
    org.springframework.web: DEBUG
    org.flywaydb: INFO

pivot:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  mail:
    from: ${PIVOT_MAIL_FROM:noreply@pivot.app}
  app:
    url: ${PIVOT_APP_URL:http://localhost:4200}
  auth:
    session-cookie-name: pivot_session
    device-cookie-name: pivot_device
    device-ttl-days: 90
    verification-ttl-hours: 24
    password-reset-ttl-minutes: 60
    device-verify-ttl-minutes: 15
    secure-cookie: false
  cleanup:
    tokens-cron: "-"  # disabled in test
