<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head><meta charset="UTF-8"/><title th:text="#{email.welcome.page-title}">Bienvenue sur PIVOT !</title></head>
<body style="margin:0;padding:0;background:#F6F3FD;font-family:'Segoe UI',Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#F6F3FD;padding:40px 0;">
    <tr><td align="center">
      <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background:#FFFFFF;border-radius:3px;box-shadow:0 2px 8px rgba(0,0,0,.08);">
        <tr><td style="background:linear-gradient(135deg,#6D28D9 0%,#6D28D9 100%);padding:40px;text-align:center;">
          <span style="color:#FFFFFF;font-size:28px;font-weight:700;letter-spacing:-0.5px;">PIVOT</span>
          <p style="margin:8px 0 0;color:#DCC9FB;font-size:14px;" th:text="#{email.welcome.tagline}">Plateforme collaborative d'entreprise</p>
        </td></tr>
        <tr><td style="padding:40px;">
          <p style="margin:0 0 16px;font-size:18px;color:#6D28D9;font-weight:600;" th:text="#{email.welcome.hello(${firstName})}">Bienvenue, là ! 🎉</p>
          <p style="margin:0 0 16px;font-size:15px;color:#564A76;line-height:1.6;" th:text="#{email.welcome.body}">
            Votre compte PIVOT est prêt.
          </p>
          <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 32px;">
            <tr><td style="background:#6D28D9;border-radius:2px;">
              <a th:href="${appUrl}" th:text="#{email.welcome.cta}" style="display:inline-block;padding:14px 32px;color:#FFFFFF;text-decoration:none;font-size:15px;font-weight:600;">
                Accéder à PIVOT
              </a>
            </td></tr>
          </table>
          <hr style="border:none;border-top:1px solid #E9E1F7;margin:0 0 24px;"/>
          <p style="margin:0;font-size:13px;color:#756693;line-height:1.6;">
            <span th:text="#{email.welcome.support.before}">Des questions ? Consultez notre</span>
            <a th:href="${docsUrl}" th:text="#{email.welcome.support.link}" style="color:#6D28D9;text-decoration:none;">documentation</a>
            <span th:text="#{email.welcome.support.after}">ou contactez notre support.</span>
          </p>
        </td></tr>
        <tr><td style="background:#F6F3FD;padding:20px 40px;border-top:1px solid #E9E1F7;">
          <p style="margin:0;font-size:12px;color:#A99BC7;text-align:center;" th:text="#{email.common.footer.copyright}">© 2026 PIVOT Platform</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
