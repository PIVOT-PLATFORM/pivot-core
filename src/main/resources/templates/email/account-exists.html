<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="#{email.account-exists.page-title}">Vous avez déjà un compte — PIVOT</title>
</head>
<body style="margin:0;padding:0;background:#F6F3FD;font-family:'Segoe UI',Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#F6F3FD;padding:40px 0;">
    <tr><td align="center">
      <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background:#FFFFFF;border-radius:3px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);">
        <!-- Header -->
        <tr><td style="background:#6D28D9;padding:28px 40px;">
          <span style="color:#FFFFFF;font-size:22px;font-weight:700;letter-spacing:-0.5px;">PIVOT</span>
        </td></tr>
        <!-- Body -->
        <tr><td style="padding:40px;">
          <p style="margin:0 0 16px;font-size:16px;color:#6D28D9;font-weight:600;" th:text="#{email.common.hello(${firstName})}">Bonjour là,</p>
          <p style="margin:0 0 24px;font-size:15px;color:#564A76;line-height:1.6;" th:text="#{email.account-exists.body}">
            Une tentative d'inscription vient d'être faite avec cette adresse email.
          </p>
          <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 32px;">
            <tr><td style="background:#6D28D9;border-radius:2px;">
              <a th:href="${loginUrl}" th:text="#{email.account-exists.cta}" style="display:inline-block;padding:14px 32px;color:#FFFFFF;text-decoration:none;font-size:15px;font-weight:600;">
                Me connecter
              </a>
            </td></tr>
          </table>
          <p style="margin:0 0 8px;font-size:13px;color:#756693;" th:text="#{email.account-exists.forgot-password}">Mot de passe oublié ?</p>
          <p style="margin:0 0 24px;font-size:13px;color:#6D28D9;word-break:break-all;" th:text="${resetUrl}"></p>
          <p style="margin:0;font-size:13px;color:#A99BC7;" th:text="#{email.account-exists.safe}">Si vous n'êtes pas à l'origine de cette tentative, vous pouvez ignorer cet email.</p>
        </td></tr>
        <!-- Footer -->
        <tr><td style="background:#F6F3FD;padding:20px 40px;border-top:1px solid #E9E1F7;">
          <p style="margin:0;font-size:12px;color:#A99BC7;text-align:center;">
            <span th:text="#{email.common.footer.copyright}">© 2026 PIVOT Platform</span>
            — <a th:href="${appUrl}" th:text="#{email.common.footer.pivot}" style="color:#756693;text-decoration:none;">pivot.app</a>
          </p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
