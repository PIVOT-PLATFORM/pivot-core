<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head><meta charset="UTF-8"/><title th:text="#{email.export-ready.page-title}">Votre export de données est prêt — PIVOT</title></head>
<body style="margin:0;padding:0;background:#F4F5F7;font-family:'Segoe UI',Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#F4F5F7;padding:40px 0;">
    <tr><td align="center">
      <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background:#FFFFFF;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.08);">
        <tr><td style="background:#1B2A4A;padding:28px 40px;">
          <span style="color:#FFFFFF;font-size:22px;font-weight:700;">PIVOT</span>
        </td></tr>
        <tr><td style="padding:40px;">
          <p style="margin:0 0 16px;font-size:16px;color:#1B2A4A;font-weight:600;" th:text="#{email.common.hello(${firstName})}">Bonjour là,</p>
          <p style="margin:0 0 24px;font-size:15px;color:#374151;line-height:1.6;" th:text="#{email.export-ready.body}">
            Votre demande d'export de vos données personnelles a été traitée avec succès.
          </p>
          <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 32px;">
            <tr><td style="background:#2563EB;border-radius:6px;">
              <a th:href="${downloadUrl}" th:text="#{email.export-ready.cta}" style="display:inline-block;padding:14px 32px;color:#FFFFFF;text-decoration:none;font-size:15px;font-weight:600;">
                Télécharger mon export
              </a>
            </td></tr>
          </table>
          <p style="margin:0 0 24px;font-size:13px;color:#9CA3AF;" th:text="#{email.export-ready.expiry}">Ce lien expire dans 24 heures.</p>
          <p style="margin:0;font-size:13px;color:#6B7280;background:#FEF3C7;border-left:3px solid #D97706;padding:10px 14px;border-radius:0 4px 4px 0;">
            <span th:text="#{email.export-ready.safe}">Si vous n'avez pas demandé cet export, contactez notre support immédiatement :</span>
            <a th:href="'mailto:' + ${supportEmail}" th:text="${supportEmail}" style="color:#2563EB;">support@pivot.app</a>
          </p>
        </td></tr>
        <tr><td style="background:#F9FAFB;padding:20px 40px;border-top:1px solid #E5E7EB;">
          <p style="margin:0;font-size:12px;color:#9CA3AF;text-align:center;" th:text="#{email.common.footer.copyright}">© 2026 PIVOT Platform</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
