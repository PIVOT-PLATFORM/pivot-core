<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="#{email.verify-email.page-title}">Confirmez votre email — PIVOT</title>
</head>
<body style="margin:0;padding:0;background:#F6F3FD;font-family:'Segoe UI',Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#F6F3FD;padding:40px 0;">
    <tr><td align="center">
      <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background:#FFFFFF;border-radius:3px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);">
        <!-- Header -->
        <tr><td style="background:#6D28D9;padding:28px 40px;">
          <span style="color:#FFFFFF;font-size:22px;font-weight:700;letter-spacing:-0.5px;">PIVOT</span>
        </td></tr>
        <!-- Body -->
        <tr><td style="padding:40px;">
          <p style="margin:0 0 16px;font-size:16px;color:#6D28D9;font-weight:600;" th:text="#{email.common.hello(${firstName})}">Bonjour là,</p>
          <p style="margin:0 0 24px;font-size:15px;color:#564A76;line-height:1.6;" th:text="#{email.verify-email.body}">
            Merci de vous être inscrit sur PIVOT.
          </p>
          <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 32px;">
            <tr><td style="background:#6D28D9;border-radius:2px;">
              <a th:href="${verifyUrl}" th:text="#{email.verify-email.cta}" style="display:inline-block;padding:14px 32px;color:#FFFFFF;text-decoration:none;font-size:15px;font-weight:600;">
                Confirmer mon email
              </a>
            </td></tr>
          </table>
          <p style="margin:0 0 8px;font-size:13px;color:#8A7EA8;" th:text="#{email.verify-email.link-label}">Ou copiez ce lien dans votre navigateur :</p>
          <p style="margin:0 0 24px;font-size:13px;color:#6D28D9;word-break:break-all;" th:text="${verifyUrl}"></p>
          <p style="margin:0 0 12px;font-size:13px;color:#A99BC7;" th:text="#{email.verify-email.expiry}">Ce lien expire dans 24 heures.</p>
          <p style="margin:0;font-size:13px;color:#8A7EA8;background:#FDEFC4;border-left:3px solid #F59E0B;padding:10px 14px;border-radius:0 2px 2px 0;">
            <span th:text="#{email.common.support.warning}">Si cette action ne vient pas de vous, contactez notre support :</span>
            <a th:href="'mailto:' + ${supportEmail}" th:text="${supportEmail}" style="color:#6D28D9;">support@pivot.app</a>
          </p>
        </td></tr>
        <!-- Footer -->
        <tr><td style="background:#F6F3FD;padding:20px 40px;border-top:1px solid #E9E1F7;">
          <p style="margin:0;font-size:12px;color:#A99BC7;text-align:center;">
            <span th:text="#{email.common.footer.copyright}">© 2026 PIVOT Platform</span>
            — <a th:href="${appUrl}" th:text="#{email.common.footer.pivot}" style="color:#8A7EA8;text-decoration:none;">pivot.app</a>
          </p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
