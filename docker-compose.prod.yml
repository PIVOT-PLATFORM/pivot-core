# docker-compose.prod.yml — PIVOT production stack.
#
# EN07.1 (pivot-docs/docs/backlog/EPIC-infrastructure/ENABLERS/en-docker-compose-prod.md).
#
# Scope note (Gate 1, confirmed against the current org — see PR description for detail):
# the enabler's original AC also lists pivot-pilotage-core / pivot-agilite-core /
# pivot-collaboratif-core, and an activemq + pgbouncer layer. Still only partially true as of
# EN07.3:
#   - the three module-core repos are real bootstrap repos today (no longer "à créer") but
#     have not published a Docker image yet — no service block is defined for them here.
#     Each wires its own `enableStompBrokerRelay()` in its own repo/PR — see the commented
#     module-core template below for the env vars it expects once it IS wired here.
#   - pivot-core itself still has zero ActiveMQ/JMS/STOMP-relay dependency — verified again for
#     this PR (grep for activemq|jms|stomp.*relay across pom.xml, application*.yml, src/
#     returns nothing beyond the pre-existing in-process notification SimpleBroker, which
#     never talks to an external broker). EN07.3 adds the ActiveMQ *broker* itself below
#     (KahaDB persistence, per-domain DLQ, internal-only) purely as shared infrastructure for
#     the module-cores to relay into — pivot-core does not connect to it.
#   - pgbouncer remains un-added (EN07.4, still Backlog) — see its own "not included" note
#     further down.
# ActiveMQ and PgBouncer are tracked as their own Enablers for exactly this incremental-rollout
# reason (EN07.3 — ActiveMQ persistence KahaDB, EN07.4 — PgBouncer session mode).
#
# Images: built + pushed to GHCR by each repo's own release.yml (Semantic Release) —
# ghcr.io/pivot-platform/pivot-core and ghcr.io/pivot-platform/pivot-ui. Pin
# PIVOT_CORE_VERSION / PIVOT_UI_VERSION (shell env, NOT a committed .env) to a released tag
# for real deployments; the `latest` default is for first bring-up only. Actually pulling and
# deploying this file in CI is EN07.5 (deploy.yml) — still `Stage: Backlog`, not wired yet;
# `deploy.yml` today is a `TODO` placeholder.
#
# Secrets: no plaintext credential in this file or in a committed .env — see the `secrets:`
# block at the bottom and pivot-docs deployment doc for the full explanation of how each
# secret file maps to a Spring property. NOTE: EN07.2 (Secret management Docker secrets) is a
# separate, concurrently in-progress Enabler covering this same ground in more depth
# (rotation procedure, `.env.example` audit) — expect to reconcile the `secrets:` block here
# with whatever EN07.2 lands, whichever PR merges second.
#
# Networks: pivot-net-app (nginx ↔ backends) and pivot-net-data (backends ↔ postgres/redis)
# are isolated on purpose — see the `networks:` section at the bottom.

services:

  nginx:
    image: ghcr.io/pivot-platform/pivot-ui:${PIVOT_UI_VERSION:-latest}
    container_name: pivot-nginx
    ports:
      - "80:80"
      # EN17.7 — TLS now handled by nginx (listen 443 ssl block added to pivot-ui's nginx.conf).
      # Certificates must be mounted at runtime (see volumes below):
      #   pivot.crt → /etc/ssl/certs/pivot.crt   (fullchain PEM)
      #   pivot.key → /etc/ssl/private/pivot.key  (private key PEM)
      # To put a TLS-terminating edge (cloud LB, CDN) in front instead, remove this port
      # binding and the certificate volume mounts, and keep only 80:80.
      - "443:443"
    networks:
      - pivot-net-app
    volumes:
      # TLS certificates (EN17.7) — mount at runtime, never commit to the repo.
      # Generate with Let's Encrypt (certbot), your CA, or a self-signed cert for staging:
      #   - /etc/letsencrypt/live/your.domain/fullchain.pem:/etc/ssl/certs/pivot.crt:ro
      #   - /etc/letsencrypt/live/your.domain/privkey.pem:/etc/ssl/private/pivot.key:ro
      # If using an external TLS terminator instead, remove this block and the 443 port above.
      - ${TLS_CERT_PATH:?TLS_CERT_PATH required (fullchain PEM)}:/etc/ssl/certs/pivot.crt:ro
      - ${TLS_KEY_PATH:?TLS_KEY_PATH required (private key PEM)}:/etc/ssl/private/pivot.key:ro
    depends_on:
      pivot-core:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # /health is on :80 (plain HTTP) — exempt from the 80→443 redirect in nginx.conf.
      # Using :80 avoids TLS and certificate dependency in the healthcheck.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pivot-core:
    image: ghcr.io/pivot-platform/pivot-core:${PIVOT_CORE_VERSION:-latest}
    container_name: pivot-core
    # No `ports:` — never reachable directly from the host. Only nginx (pivot-net-app) can
    # reach it; that's the "no backend port exposed directly" AC.
    networks:
      pivot-net-app:
        # EN17.7 removed the `backend` alias: pivot-ui's nginx.conf now references
        # `pivot-core:8080` directly (upstream pivot_core_rest). The alias is no longer needed.
      pivot-net-data: {}
    environment:
      # application-prod.yml (EN07.2) activates here and imports the secret.* config tree
      # from SECRET_FILE_PATH (defaults to /run/secrets, set explicitly below for clarity).
      SPRING_PROFILES_ACTIVE: prod
      SECRET_FILE_PATH: /run/secrets
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pivot
      SPRING_DATASOURCE_USERNAME: pivot
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_MAIL_HOST: ${SMTP_HOST:?SMTP_HOST is required in production — set a real SMTP relay, mailpit is dev-only}
      SPRING_MAIL_PORT: ${SMTP_PORT:-587}
      SPRING_MAIL_USERNAME: ${SMTP_USERNAME:?SMTP_USERNAME is required in production}
      PIVOT_MAIL_FROM: ${PIVOT_MAIL_FROM:?PIVOT_MAIL_FROM is required in production}
      PIVOT_APP_URL: ${PIVOT_APP_URL:?PIVOT_APP_URL is required in production}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required in production}
      PIVOT_SUPPORT_EMAIL: ${PIVOT_SUPPORT_EMAIL:-support@pivot.app}
      PIVOT_OWNER_MAIL: ${PIVOT_OWNER_MAIL:-}
      OIDC_ISSUER_URI: ${OIDC_ISSUER_URI:-}
    secrets:
      # Target filenames are NOT arbitrary — each one must match, verbatim, the "secret.*"
      # property key its application.yml placeholder falls back to (EN07.2 —
      # docs/deployment/secret-management.md). Spring's configtree PropertySource keys each
      # imported value by the exact filename, never split on dots — the import itself is
      # already active via the `prod` profile (application-prod.yml, SECRET_FILE_PATH
      # defaults to /run/secrets, the standard Docker secrets mount point), not repeated here.
      - source: postgres_password
        target: secret.datasource-password
      - source: mail_password
        target: secret.mail-password
      - source: otp_secret
        target: secret.auth-otp-secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # EN04.4 — target + timing exactly per this Enabler's AC. `curl` (not `wget`): the
      # Dockerfile's own HEALTHCHECK already installs curl in the runtime image for this
      # exact purpose (EN04.2) — reusing it here keeps a single tool instead of two. Port
      # :8081, no /api prefix: EN04.2 moved Actuator to its own `management.server.port`,
      # which does NOT inherit `server.servlet.context-path` (see application.yml, README.md)
      # — the real path is http://localhost:8081/actuator/health, never
      # http://localhost:8080/api/actuator/health (this file's target before EN04.2 existed;
      # stale as of this PR, corrected here). This is the root/aggregate health group (db +
      # redis + flyway + diskSpace + ...) — the dedicated `/actuator/health/readiness` and
      # `/actuator/health/liveness` groups this Enabler also adds (application.yml) are not
      # used by this Docker-level check: Compose (non-Swarm) only gates `depends_on:
      # condition: service_healthy` on it and surfaces `docker ps` status, it never restarts
      # a container on health-check failure alone, so the root group's broader signal (any
      # dependency down = don't let dependents start yet) is the more useful one here.
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # --- Module-core services — NOT wired yet -----------------------------------------
  # pivot-pilotage-core, pivot-agilite-core, pivot-collaboratif-core don't exist as repos yet
  # ("à créer avec le repo" — pivot-platform/CLAUDE.md). EN17.7 added nginx routing for their
  # URL prefixes (/api/pilotage/, /api/agilite/, /api/collaboratif/, /ws/{module}/) using
  # Docker's resolver (127.0.0.11) with per-request hostname resolution — nginx starts fine
  # without these services and returns 503 for their prefixes until they exist.
  #
  # Port convention (matches nginx.conf upstreams in pivot-ui, agreed in EN17.7):
  #   pivot-pilotage-core    → 8081  (Spring management port: 9081)
  #   pivot-agilite-core     → 8082  (Spring management port: 9082)
  #   pivot-collaboratif-core → 8083 (Spring management port: 9083)
  #
  # Once a repo exists and publishes ghcr.io/pivot-platform/<repo>:<tag>, add a service block:
  #
  #   pivot-pilotage-core:
  #     image: ghcr.io/pivot-platform/pivot-pilotage-core:${PIVOT_PILOTAGE_VERSION:-latest}
  #     container_name: pivot-pilotage-core
  #     # server.port=8081, management.server.port=9081 (set in that repo's application.yml)
  #     networks:
  #       pivot-net-app: {}   # reachable by nginx (/api/pilotage/, /ws/pilotage/)
  #       pivot-net-data: {}  # reachable by postgres/redis — no host port exposed
  #     environment:
  #       SPRING_PROFILES_ACTIVE: prod
  #       SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pivot
  #       SPRING_DATASOURCE_USERNAME: pivot
  #       SPRING_DATA_REDIS_HOST: redis
  #       # EN07.3 — this module-core's own enableStompBrokerRelay() reads these (defaults
  #       # already match if omitted, explicit here for consistency with this file's style).
  #       PIVOT_ACTIVEMQ_RELAY_HOST: activemq
  #       PIVOT_ACTIVEMQ_RELAY_PORT: "61613"
  #     secrets:
  #       - source: postgres_password
  #         target: secret.datasource-password
  #     depends_on:
  #       postgres:  { condition: service_healthy }
  #       redis:     { condition: service_healthy }
  #       activemq:  { condition: service_healthy }
  #     healthcheck:
  #       test: ["CMD-SHELL", "curl -f http://localhost:9081/actuator/health || exit 1"]
  #       interval: 10s
  #       timeout: 5s
  #       retries: 3
  #       start_period: 30s
  #     restart: unless-stopped
  #
  # Same shape for pivot-agilite-core (:8082, management :9082) and
  # pivot-collaboratif-core (:8083, management :9083). No nginx change needed — EN17.7 already
  # has the location blocks; nginx will start routing as soon as the service is in the network.
  # ------------------------------------------------------------------------------------

  postgres:
    image: postgres:18-alpine
    container_name: pivot-postgres
    environment:
      POSTGRES_DB: pivot
      POSTGRES_USER: pivot
      # Official postgres image's own Docker-secrets convention — no configtree needed here.
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - pivot-net-data
    # No `ports:` — reachable only from pivot-core (and future module-cores) over
    # pivot-net-data, never from the host. Dev compose.yml publishes 5432 for local
    # psql/DBeaver convenience; production has no such need.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pivot -d pivot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pivot-redis
    volumes:
      - redis_data:/data
    networks:
      - pivot-net-data
    # No `ports:` — same reasoning as postgres above.
    # Known gap (out of scope for EN07.1, flagged for a follow-up hardening enabler): Redis
    # runs unauthenticated — no `requirepass` / `spring.data.redis.password` configured
    # anywhere in pivot-core today. Network isolation (pivot-net-data, no host port, no
    # access from nginx) is the only control in place right now.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # EN07.3 — shared cross-module-core event bus. KahaDB persistence (custom
  # docker/activemq/activemq.xml — see its header comment for the per-domain DLQ policy and
  # destination naming convention), memory/store/temp usage limits, only openwire+stomp
  # transport connectors. pivot-net-data only — never pivot-net-app — so the web console
  # (:8161) can never be reached through nginx; no `ports:` published either, matching
  # postgres/redis. pivot-core itself never depends on or connects to this service (no
  # WS/STOMP relay in the shell). Module-core services will add `activemq: { condition:
  # service_healthy }` to their own `depends_on:` once wired (see commented template above).
  activemq:
    image: apache/activemq-classic:6.2.0
    container_name: pivot-activemq
    environment:
      ACTIVEMQ_DATA: /var/lib/activemq/data
    volumes:
      - ./docker/activemq/activemq.xml:/opt/apache-activemq/conf/activemq.xml:ro
      - activemq_data:/var/lib/activemq/data
    networks:
      - pivot-net-data
    # No `ports:` — reachable only from module-core containers over pivot-net-data, same
    # reasoning as postgres/redis above. Console requires HTTP Basic auth (default
    # admin/admin) — known gap, same posture as the unauthenticated Redis gap below: network
    # isolation is the only control, out of scope for this Enabler (would need a
    # secret-rotation story like EN07.2).
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8161/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # --- pgbouncer — NOT included --------------------------------------------------------
  # Verified against this codebase (pom.xml, application*.yml, src/): no pgbouncer dependency
  # exists today. Already tracked as its own Enabler (Backlog, not started) rather than being
  # speculatively wired here:
  #   - EN07.4 — PgBouncer session mode configuration prod: connection pooling in front of
  #     the single Postgres instance once connection count from multiple backends needs it.
  # When it lands, add the service on pivot-net-data alongside postgres/redis/activemq above,
  # following the same no-host-port / healthcheck / restart:unless-stopped pattern.
  # ------------------------------------------------------------------------------------

networks:
  pivot-net-app:
    driver: bridge
  pivot-net-data:
    driver: bridge
    internal: true   # no route out — postgres/redis reachable only from containers attached here

volumes:
  postgres_data:
  redis_data:
  activemq_data:

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  mail_password:
    file: ./secrets/mail_password.txt
  otp_secret:
    file: ./secrets/otp_secret.txt
