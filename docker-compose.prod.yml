# docker-compose.prod.yml — PIVOT production stack.
#
# EN07.1 (pivot-docs/docs/backlog/EPIC-infrastructure/ENABLERS/en-docker-compose-prod.md).
#
# Scope note — EN53 (ADR-030) : agilité et collaboratif sont désormais des MODULES INTERNES
# du backend modulith pivot-core. Les services standalone pivot-agilite-core /
# pivot-collaboratif-core ont été RETIRÉS de cette stack : le seul backend applicatif est
# pivot-core, qui sert /api/{agilite,collaboratif}/** en plus du socle. Le gateway nginx
# (image pivot-ui) route tout /api/** vers pivot-core.
#   - EN07.3 conserve le broker ActiveMQ ci-dessous (KahaDB, DLQ par domaine, interne) comme
#     infrastructure de relais STOMP pour les modules ; pivot-core lui-même n'y connecte pas
#     son socle (in-process SimpleBroker), mais le module collaboratif y relaie ses topics.
#   - pgbouncer (EN07.4) is now wired below: a session-mode pooler sits between pivot-core
#     and postgres (`SPRING_DATASOURCE_URL` now points at `pgbouncer`, never `postgres`
#     directly) — see the pgbouncer service comment further down for the full rationale.
# ActiveMQ and PgBouncer are tracked as their own Enablers for exactly this incremental-rollout
# reason (EN07.3 — ActiveMQ persistence KahaDB, EN07.4 — PgBouncer session mode).
#
# Images: built + pushed to GHCR by each repo's own release.yml (Semantic Release) —
# ghcr.io/pivot-platform/pivot-core et ghcr.io/pivot-platform/pivot-ui. Aucun des deux repos ne
# publie de tag `latest` (interdit par .plumber.yaml containerImageMustNotUseForbiddenTags — voir
# pivot-core#213, pivot-ui#146) — PIVOT_CORE_VERSION /
# PIVOT_UI_VERSION (shell env, NOT a committed .env) are
# therefore required, pinned to a released tag, with no `:-latest` fallback (a fallback would
# either fail to pull outright — no such tag exists — or, worse, silently freeze on a stale
# digest from before a repo's own history; see pivot-core#219 for this exact fix applied to
# the other two services). Actually pulling and deploying this file in CI is EN07.5
# (deploy.yml) — fully implemented (SSH deploy, smoke test, auto-rollback, Slack
# notification), triggered on `release: published` or manual `workflow_dispatch`.
#
# Secrets: no plaintext credential in this file or in a committed .env — see the `secrets:`
# block at the bottom and pivot-docs deployment doc for the full explanation of how each
# secret file maps to a Spring property. NOTE: EN07.2 (Secret management Docker secrets) is a
# separate, concurrently in-progress Enabler covering this same ground in more depth
# (rotation procedure, `.env.example` audit) — expect to reconcile the `secrets:` block here
# with whatever EN07.2 lands, whichever PR merges second.
#
# Networks: pivot-net-app (nginx ↔ backends) and pivot-net-data (backends ↔ postgres/redis)
# are isolated on purpose — see the `networks:` section at the bottom.

services:

  nginx:
    image: ghcr.io/pivot-platform/pivot-ui:${PIVOT_UI_VERSION:?PIVOT_UI_VERSION is required in production, pin to a released tag}
    container_name: pivot-nginx
    ports:
      - "80:80"
      # EN17.7 — TLS now handled by nginx (listen 443 ssl block added to pivot-ui's nginx.conf).
      # Certificates must be mounted at runtime (see volumes below):
      #   pivot.crt → /etc/ssl/certs/pivot.crt   (fullchain PEM)
      #   pivot.key → /etc/ssl/private/pivot.key  (private key PEM)
      # To put a TLS-terminating edge (cloud LB, CDN) in front instead, remove this port
      # binding and the certificate volume mounts, and keep only 80:80.
      - "443:443"
    networks:
      - pivot-net-app
    volumes:
      # TLS certificates (EN17.7) — mount at runtime, never commit to the repo.
      # Generate with Let's Encrypt (certbot), your CA, or a self-signed cert for staging:
      #   - /etc/letsencrypt/live/your.domain/fullchain.pem:/etc/ssl/certs/pivot.crt:ro
      #   - /etc/letsencrypt/live/your.domain/privkey.pem:/etc/ssl/private/pivot.key:ro
      # If using an external TLS terminator instead, remove this block and the 443 port above.
      - ${TLS_CERT_PATH:?TLS_CERT_PATH required (fullchain PEM)}:/etc/ssl/certs/pivot.crt:ro
      - ${TLS_KEY_PATH:?TLS_KEY_PATH required (private key PEM)}:/etc/ssl/private/pivot.key:ro
    depends_on:
      pivot-core:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # /health is on :80 (plain HTTP) — exempt from the 80→443 redirect in nginx.conf.
      # Using :80 avoids TLS and certificate dependency in the healthcheck.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pivot-core:
    image: ghcr.io/pivot-platform/pivot-core:${PIVOT_CORE_VERSION:?PIVOT_CORE_VERSION is required in production, pin to a released tag}
    container_name: pivot-core
    # No `ports:` — never reachable directly from the host. Only nginx (pivot-net-app) can
    # reach it; that's the "no backend port exposed directly" AC.
    networks:
      pivot-net-app:
        # EN17.7 removed the `backend` alias: pivot-ui's nginx.conf now references
        # `pivot-core:8080` directly (upstream pivot_core_rest). The alias is no longer needed.
      pivot-net-data: {}
    environment:
      # application-prod.yml (EN07.2) activates here and imports the secret.* config tree
      # from SECRET_FILE_PATH (defaults to /run/secrets, set explicitly below for clarity).
      SPRING_PROFILES_ACTIVE: prod
      SECRET_FILE_PATH: /run/secrets
      # EN07.4 — routed through pgbouncer (session mode), never straight to postgres — the
      # "pivot-core se connecte à PgBouncer (pas directement à Postgres)" AC. Port stays 5432:
      # edoburu/pgbouncer listens on 5432 by default (transparent drop-in), only the hostname
      # changes. See the pgbouncer service below for pool sizing / mode rationale.
      SPRING_DATASOURCE_URL: jdbc:postgresql://pgbouncer:5432/pivot
      SPRING_DATASOURCE_USERNAME: pivot
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_MAIL_HOST: ${SMTP_HOST:?SMTP_HOST is required in production — set a real SMTP relay, mailpit is dev-only}
      SPRING_MAIL_PORT: ${SMTP_PORT:-587}
      SPRING_MAIL_USERNAME: ${SMTP_USERNAME:?SMTP_USERNAME is required in production}
      PIVOT_MAIL_FROM: ${PIVOT_MAIL_FROM:?PIVOT_MAIL_FROM is required in production}
      PIVOT_APP_URL: ${PIVOT_APP_URL:?PIVOT_APP_URL is required in production}
      # Whiteboard invitation links (US08.2.x) — derived from PIVOT_APP_URL rather than exposing a
      # second required variable: both denote the public origin of the front end, and an operator
      # setting one but not the other would ship dead share links without any startup error.
      PIVOT_SHARE_BASE_URL: ${PIVOT_APP_URL:?PIVOT_APP_URL is required in production}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required in production}
      PIVOT_SUPPORT_EMAIL: ${PIVOT_SUPPORT_EMAIL:-support@pivot.app}
      PIVOT_OWNER_MAIL: ${PIVOT_OWNER_MAIL:-}
      OIDC_ISSUER_URI: ${OIDC_ISSUER_URI:-}
    secrets:
      # Target filenames are NOT arbitrary — each one must match, verbatim, the "secret.*"
      # property key its application.yml placeholder falls back to (EN07.2 —
      # docs/deployment/secret-management.md). Spring's configtree PropertySource keys each
      # imported value by the exact filename, never split on dots — the import itself is
      # already active via the `prod` profile (application-prod.yml, SECRET_FILE_PATH
      # defaults to /run/secrets, the standard Docker secrets mount point), not repeated here.
      - source: postgres_password
        target: secret.datasource-password
      - source: mail_password
        target: secret.mail-password
      - source: otp_secret
        target: secret.auth-otp-secret
    depends_on:
      # EN07.4 — depends on pgbouncer being healthy, not postgres directly: pivot-core never
      # opens a socket to postgres itself anymore (see SPRING_DATASOURCE_URL above). pgbouncer
      # itself depends on postgres (see its own depends_on below), so the effective startup
      # order (postgres → pgbouncer → pivot-core) is unchanged, just one hop longer.
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # EN04.4 — target + timing exactly per this Enabler's AC. `curl` (not `wget`): the
      # Dockerfile's own HEALTHCHECK already installs curl in the runtime image for this
      # exact purpose (EN04.2) — reusing it here keeps a single tool instead of two. Port
      # :8081, no /api prefix: EN04.2 moved Actuator to its own `management.server.port`,
      # which does NOT inherit `server.servlet.context-path` (see application.yml, README.md)
      # — the real path is http://localhost:8081/actuator/health, never
      # http://localhost:8080/api/actuator/health (this file's target before EN04.2 existed;
      # stale as of this PR, corrected here). This is the root/aggregate health group (db +
      # redis + flyway + diskSpace + ...) — the dedicated `/actuator/health/readiness` and
      # `/actuator/health/liveness` groups this Enabler also adds (application.yml) are not
      # used by this Docker-level check: Compose (non-Swarm) only gates `depends_on:
      # condition: service_healthy` on it and surfaces `docker ps` status, it never restarts
      # a container on health-check failure alone, so the root group's broader signal (any
      # dependency down = don't let dependents start yet) is the more useful one here.
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:18-alpine
    container_name: pivot-postgres
    environment:
      POSTGRES_DB: pivot
      POSTGRES_USER: pivot
      # Official postgres image's own Docker-secrets convention — no configtree needed here.
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - pivot-net-data
    # No `ports:` — reachable only from pivot-core (and future module-cores) over
    # pivot-net-data, never from the host. Dev compose.yml publishes 5432 for local
    # psql/DBeaver convenience; production has no such need.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pivot -d pivot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pivot-redis
    volumes:
      - redis_data:/data
    networks:
      - pivot-net-data
    # No `ports:` — same reasoning as postgres above.
    # Known gap (out of scope for EN07.1, flagged for a follow-up hardening enabler): Redis
    # runs unauthenticated — no `requirepass` / `spring.data.redis.password` configured
    # anywhere in pivot-core today. Network isolation (pivot-net-data, no host port, no
    # access from nginx) is the only control in place right now.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # EN07.3 — shared cross-module-core event bus. KahaDB persistence (custom
  # docker/activemq/activemq.xml — see its header comment for the per-domain DLQ policy and
  # destination naming convention), memory/store/temp usage limits, only openwire+stomp
  # transport connectors. pivot-net-data only — never pivot-net-app — so the web console
  # (:8161) can never be reached through nginx; no `ports:` published either, matching
  # postgres/redis. pivot-core itself never depends on or connects to this service (no
  # WS/STOMP relay in the shell). Module-core services will add `activemq: { condition:
  # service_healthy }` to their own `depends_on:` once wired (see commented template above).
  activemq:
    image: apache/activemq-classic:6.2.0
    container_name: pivot-activemq
    environment:
      ACTIVEMQ_DATA: /var/lib/activemq/data
    volumes:
      - ./docker/activemq/activemq.xml:/opt/apache-activemq/conf/activemq.xml:ro
      - activemq_data:/var/lib/activemq/data
    networks:
      - pivot-net-data
    # No `ports:` — reachable only from module-core containers over pivot-net-data, same
    # reasoning as postgres/redis above. Console requires HTTP Basic auth (default
    # admin/admin) — known gap, same posture as the unauthenticated Redis gap below: network
    # isolation is the only control, out of scope for this Enabler (would need a
    # secret-rotation story like EN07.2).
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8161/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # EN07.4 — session-mode connection pooler sitting between pivot-core (and, once wired, the
  # module-core services above) and postgres. Absorbs the "N Spring Boot services, each its
  # own unmutualized Hikari pool, one shared Postgres instance" risk introduced by EN17.9: as
  # more services/replicas start, their combined Hikari pools could otherwise exceed
  # postgres's max_connections and get hard-refused. PgBouncer turns that into a soft queue
  # instead — clients wait for a free pool slot rather than Postgres rejecting the connection
  # outright.
  #
  # Why `session` mode specifically (not the more commonly-touted `transaction` mode): a
  # session-mode pool assigns one real backend connection to a client for that client's
  # entire connection lifetime, which is exactly what JPA/Hibernate needs — server-side
  # prepared statements survive across statements (transaction/statement-mode pooling can
  # silently break these, since a client may get handed a *different* backend connection
  # between statements), long-running transactions are safe, and Flyway's advisory locks
  # (used by pivot-core's own migration run at startup — session-scoped by design in
  # Postgres) keep working. The trade-off — a session-mode pool only bounds real connections
  # if clients actually reconnect rather than holding one open forever — is verified in
  # practice by docker/pgbouncer/loadtest.sh (see "Verified locally" in this PR's description).
  #
  # Pool sizing (`max_client_conn` / `default_pool_size` AC): single (user=pivot, db=pivot)
  # pool — every service here authenticates as the same `pivot` role against the same `pivot`
  # database (see DB_USER/DB_NAME below), so PgBouncer enforces one shared ceiling regardless
  # of how many services/replicas are asking.
  #   - DEFAULT_POOL_SIZE=20 real backend connections to postgres — comfortably under
  #     postgres's compiled-in default max_connections=100 (superuser_reserved_connections=3
  #     leaves ~97 for regular roles), leaving headroom for autovacuum, admin psql sessions,
  #     and future replicas without touching postgres's own config.
  #   - MAX_CLIENT_CONN=200 client-side sockets accepted by pgbouncer itself — today's 3
  #     services (pivot-core + the 2 module-cores once wired) x Hikari's default
  #     maximum-pool-size (10) = 30 baseline; 200 leaves room to scale each service to several
  #     replicas before this ceiling (not postgres's own hard limit) is what queues new
  #     connection attempts. See application-prod.yml for pivot-core's own explicit Hikari
  #     sizing tied to this same math.
  #   - MIN_POOL_SIZE=5 / RESERVE_POOL_SIZE=5 (+3s RESERVE_POOL_TIMEOUT): keep a handful of
  #     backend connections warm instead of opening one from cold on every burst, with a
  #     small reserve pgbouncer can dip into under a sudden spike beyond DEFAULT_POOL_SIZE.
  #
  # AUTH_TYPE=scram-sha-256: matches postgres 18's default password_encryption/pg_hba method
  # (this stack never overrides POSTGRES_HOST_AUTH_METHOD) — `md5`-only auth would fail
  # against the real backend. The edoburu image stores the plaintext password in
  # userlist.txt for both `plain` and `scram-sha-256` (never a bare MD5 digest), which is what
  # lets pgbouncer itself perform SCRAM against postgres.
  #
  # Secret handling: reuses the SAME `postgres_password` Docker secret as the `postgres`
  # service above — no new secret to provision or rotate. Neither this image nor the exporter
  # below supports the "_FILE" Docker-secrets convention the official postgres image does, so
  # docker/pgbouncer/entrypoint.sh bridges the gap (reads the secret file, exports it as
  # DB_PASSWORD, then hands off to the image's real entrypoint) — see that script's header
  # comment for the full reasoning. The plaintext password never appears in this file, an
  # env var visible to `docker inspect`, or a committed .env.
  #
  # ADMIN_USERS/STATS_USERS=pivot: reuses the same `pivot` role for pgbouncer's own admin
  # console (SHOW POOLS/SHOW STATS) rather than provisioning a second secret purely for
  # metrics — PgBouncer's admin flag is internal to PgBouncer itself and grants no extra
  # privilege on the real Postgres role.
  #
  # pivot-net-data only — never pivot-net-app — and no `ports:` published, same posture as
  # postgres/redis/activemq above: reachable only from containers on pivot-net-data.
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    container_name: pivot-pgbouncer
    entrypoint: ["/docker-entrypoint-wrapper.sh"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: pivot
      DB_USER: pivot
      DB_PASSWORD_FILE: /run/secrets/postgres_password
      POOL_MODE: session
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "5"
      RESERVE_POOL_TIMEOUT: "3"
      AUTH_TYPE: scram-sha-256
      ADMIN_USERS: pivot
      STATS_USERS: pivot
      SERVER_RESET_QUERY: DISCARD ALL
      LOG_STATS: "1"
    volumes:
      - ./docker/pgbouncer/entrypoint.sh:/docker-entrypoint-wrapper.sh:ro
    secrets:
      - postgres_password
    networks:
      - pivot-net-data
    # No `ports:` — reachable only from pivot-core (and future module-cores) over
    # pivot-net-data, same reasoning as postgres/redis/activemq above.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U pivot -d pivot || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # EN07.4 — Prometheus sidecar exposing PgBouncer pool utilization (SHOW POOLS/SHOW STATS —
  # client/server active/idle/waiting connections, configured max_client_conn, oldest unserved
  # client age...) as /metrics — the "Métriques PgBouncer exposées (pool utilization)" AC. Same
  # posture as prometheus.yml's existing pivot-core target: exposes the endpoint, does not run
  # a Prometheus server to scrape it (out of scope here, see prometheus.yml's own header
  # comment) — pivot-net-data only, no `ports:` published.
  pgbouncer-exporter:
    image: prometheuscommunity/pgbouncer-exporter:v0.12.1
    container_name: pivot-pgbouncer-exporter
    entrypoint: ["/docker-entrypoint-wrapper.sh"]
    environment:
      DB_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - ./docker/pgbouncer/exporter-entrypoint.sh:/docker-entrypoint-wrapper.sh:ro
    secrets:
      - postgres_password
    networks:
      - pivot-net-data
    # No `ports:` — a future Prometheus server (see prometheus.yml) would need to join
    # pivot-net-data to scrape :9127, same reasoning as pivot-core's own :8081 today.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9127/metrics"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      pgbouncer:
        condition: service_healthy
    restart: unless-stopped

networks:
  pivot-net-app:
    driver: bridge
  pivot-net-data:
    driver: bridge
    internal: true   # no route out — postgres/redis reachable only from containers attached here

volumes:
  postgres_data:
  redis_data:
  activemq_data:

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  mail_password:
    file: ./secrets/mail_password.txt
  otp_secret:
    file: ./secrets/otp_secret.txt
