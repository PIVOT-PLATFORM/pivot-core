sonar.projectKey=PIVOT-PLATFORM_pivot-core
sonar.organization=pivot-platform
sonar.projectName=pivot-core

# NOTE (2026-07-18, EN53 gate investigation): CI (ci.yml "sonar" job) runs `mvn sonar:sonar` at
# the reactor root, NOT the sonar-scanner CLI — the Maven Sonar plugin derives sonar.sources /
# sonar.tests / sonar.java.binaries per module from each module's own POM (compileSourceRoots +
# outputDirectory) and does NOT read this properties file. Confirmed empirically: agilite/ and
# collaboratif/ files show up correctly analyzed in SonarCloud (PR #226/#227) even though this
# file never listed their paths. Kept in sync below anyway for any tooling that DOES read it
# (sonar-scanner CLI, IDE SonarLint project binding) — the real coverage-wiring bug was the CI
# artifact upload step omitting agilite/collaboratif target dirs, fixed in ci.yml.
# Multi-module: app/ (artifactId pivot-core-app) compiles root src/ ; starter/, agilite/,
# collaboratif/ each have their own src/.
sonar.sources=src/main/java,starter/src/main/java,agilite/src/main/java,collaboratif/src/main/java
sonar.tests=src/test/java,starter/src/test/java,agilite/src/test/java,collaboratif/src/test/java

sonar.java.binaries=app/target/classes,starter/target/classes,agilite/target/classes,collaboratif/target/classes
sonar.java.source=24

sonar.coverage.jacoco.xmlReportPaths=app/target/site/jacoco/jacoco.xml,starter/target/site/jacoco/jacoco.xml,agilite/target/site/jacoco/jacoco.xml,collaboratif/target/site/jacoco/jacoco.xml

sonar.exclusions=**/generated/**,src/main/resources/**,starter/src/main/resources/**,agilite/src/main/resources/**,collaboratif/src/main/resources/**
sonar.test.exclusions=app/target/**,starter/target/**,agilite/target/**,collaboratif/target/**

sonar.sourceEncoding=UTF-8
