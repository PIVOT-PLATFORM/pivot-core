sonar.projectKey=PIVOT-PLATFORM_pivot-core
sonar.organization=pivot-platform
sonar.projectName=pivot-core

# Multi-module: app/ (artifactId pivot-core-app) compiles root src/ ; starter/ (pivot-core-starter) has its own src/
sonar.sources=src/main/java,starter/src/main/java
sonar.tests=src/test/java,starter/src/test/java

sonar.java.binaries=app/target/classes,starter/target/classes
sonar.java.source=24

sonar.coverage.jacoco.xmlReportPaths=app/target/site/jacoco/jacoco.xml,starter/target/site/jacoco/jacoco.xml

sonar.exclusions=**/generated/**,src/main/resources/**,starter/src/main/resources/**
sonar.test.exclusions=app/target/**,starter/target/**

sonar.sourceEncoding=UTF-8
