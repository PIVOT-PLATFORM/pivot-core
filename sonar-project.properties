sonar.projectKey=PIVOT-PLATFORM_pivot-core
sonar.organization=pivot-platform
sonar.projectName=pivot-core

# Multi-module: pivot-core-app compiles root src/ ; pivot-core-starter has its own src/
sonar.sources=src/main/java,pivot-core-starter/src/main/java
sonar.tests=src/test/java,pivot-core-starter/src/test/java

sonar.java.binaries=pivot-core-app/target/classes,pivot-core-starter/target/classes
sonar.java.source=24

sonar.coverage.jacoco.xmlReportPaths=pivot-core-app/target/site/jacoco/jacoco.xml,pivot-core-starter/target/site/jacoco/jacoco.xml

sonar.exclusions=**/generated/**,src/main/resources/**,pivot-core-starter/src/main/resources/**
sonar.test.exclusions=pivot-core-app/target/**,pivot-core-starter/target/**

sonar.sourceEncoding=UTF-8
