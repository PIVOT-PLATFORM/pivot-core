services:

  postgres:
    image: postgres:18-alpine
    container_name: pivot-postgres
    environment:
      POSTGRES_DB: pivot_dev
      POSTGRES_USER: pivot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pivot_dev}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pivot -d pivot_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pivot-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: pivot-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"   # UI web → http://localhost:8025
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    restart: unless-stopped

  # EN07.3 — shared cross-module-core event bus (STOMP relay target for each module-core's
  # own enableStompBrokerRelay()). pivot-core itself never connects to this broker — see
  # docker/activemq/activemq.xml header comment.
  activemq:
    image: apache/activemq-classic:6.2.0
    container_name: pivot-activemq
    environment:
      ACTIVEMQ_DATA: /var/lib/activemq/data
    volumes:
      - ./docker/activemq/activemq.xml:/opt/apache-activemq/conf/activemq.xml:ro
      - activemq_data:/var/lib/activemq/data
    ports:
      # Web console — published here for local developer convenience only (inspecting
      # queues/DLQs while iterating), same precedent as the Actuator port 8081 above.
      # docker-compose.prod.yml does NOT publish this port (console must stay internal-only).
      - "8161:8161"
    healthcheck:
      # No `-f`: the console requires HTTP Basic auth and returns 401 on `/` by default —
      # that response IS "healthy" (the server is up), `-f` would wrongly treat 401 as down.
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8161/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # EN07.4 — session-mode connection pooler in front of the single dev Postgres instance,
  # same role as in production (docker-compose.prod.yml) — see that file's pgbouncer service
  # comment for the full rationale (why session mode, why these pool sizes). Wired into dev
  # too (not just prod) so `backend`/the module satellites below exercise the exact same
  # connection path locally, and so docker/pgbouncer/loadtest.sh has something real to run
  # against without needing the full prod stack (TLS certs, Docker secrets, etc).
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    container_name: pivot-pgbouncer
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: pivot_dev
      DB_USER: pivot
      # Dev only — compose.yml has no Docker secrets mechanism (see docker-compose.prod.yml /
      # docs/deployment/secret-management.md for the file-based secret used in prod instead).
      DB_PASSWORD: ${POSTGRES_PASSWORD:-pivot_dev}
      POOL_MODE: session
      MAX_CLIENT_CONN: "200"
      # EN53 (ADR-030) — the dev stack now runs a SINGLE Spring Boot app: the pivot-core
      # modulith (backend) embeds the agilite/collaboratif modules, which previously ran as
      # separate services. In session mode each Hikari connection pins one server connection
      # for its whole lifetime, so the pool must cover the backend's Hikari pool (Spring default
      # maximumPoolSize=10) plus headroom. 50 was sized for three apps; kept as-is — generous
      # headroom, no functional need to shrink it.
      DEFAULT_POOL_SIZE: "50"
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "10"
      RESERVE_POOL_TIMEOUT: "3"
      AUTH_TYPE: scram-sha-256
      # Reuses the same `pivot` role as admin/stats user (see pgbouncer-exporter below) —
      # PgBouncer's admin flag is internal to PgBouncer, grants no extra Postgres privilege.
      ADMIN_USERS: pivot
      STATS_USERS: pivot
      SERVER_RESET_QUERY: DISCARD ALL
      LOG_STATS: "1"
    ports:
      # Dev convenience only (inspect pools directly via
      # `psql postgresql://pivot:...@localhost:6432/pgbouncer`, or point a local tool
      # straight at the pooled port) — docker-compose.prod.yml does not publish this port,
      # same precedent as postgres/activemq above.
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U pivot -d pivot_dev || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # EN07.4 — Prometheus sidecar exposing PgBouncer pool utilization (SHOW POOLS/SHOW STATS)
  # as /metrics — see prometheus.yml (not scraped by any running Prometheus server in this
  # stack yet, same posture as pivot-core's own :8081/actuator/prometheus target there).
  pgbouncer-exporter:
    image: prometheuscommunity/pgbouncer-exporter:v0.12.1
    container_name: pivot-pgbouncer-exporter
    environment:
      PGBOUNCER_EXPORTER_CONNECTION_STRING: "postgres://pivot:${POSTGRES_PASSWORD:-pivot_dev}@pgbouncer:5432/pgbouncer?sslmode=disable"
    ports:
      - "9127:9127"   # dev convenience only, same precedent as above.
    depends_on:
      pgbouncer:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pivot-backend
    ports:
      - "8080:8080"
      # EN04.2 — Actuator management port. Published here for local developer convenience
      # only (dev compose, already bound to the dev machine's loopback/LAN, not the public
      # Internet) — docker-compose.prod.yml (EN07.1) does NOT publish this port.
      - "8081:8081"
    environment:
      # EN07.4 — routed through pgbouncer (session mode), never straight to postgres. Port
      # stays 5432: edoburu/pgbouncer listens on 5432 by default (transparent drop-in), only
      # the hostname changes.
      SPRING_DATASOURCE_URL: jdbc:postgresql://pgbouncer:5432/pivot_dev
      SPRING_DATASOURCE_USERNAME: pivot
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-pivot_dev}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-pivot@localhost}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      PIVOT_MAIL_FROM: ${MAIL_FROM:-pivot@localhost}
      PIVOT_APP_URL: ${APP_URL:-http://localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      OIDC_ISSUER_URI: ${OIDC_ISSUER_URI:-}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      default:
        aliases:
          - pivot-core

  frontend:
    build:
      context: ../pivot-ui
      dockerfile: Dockerfile
      # Local dev build needs read access to the private @pivot-platform/* npm
      # packages historically published by the module-ui repos — désormais rapatriées
      # dans le workspace pivot-ui (EN53.4). Le token npm reste requis pour d'éventuelles
      # deps privées : même secret id/mechanism que la CI, depuis NODE_AUTH_TOKEN.
      secrets:
        - npm_token
    container_name: pivot-frontend
    ports:
      - "80:80"
    volumes:
      - ../pivot-ui/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  activemq_data:

secrets:
  # Frontend (pivot-ui) build — private @pivot-platform/* npm packages (GitHub Packages, npm).
  npm_token:
    environment: NODE_AUTH_TOKEN
  # EN53 (ADR-030) — les secrets Maven github_actor/github_token ont été retirés avec les
  # services standalone agilite/collaboratif : le backend modulith build son starter dans le
  # même réacteur Maven, sans dépendance GitHub Packages privée.
