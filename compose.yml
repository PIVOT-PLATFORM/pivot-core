services:

  postgres:
    image: postgres:18-alpine
    container_name: pivot-postgres
    environment:
      POSTGRES_DB: pivot_dev
      POSTGRES_USER: pivot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pivot_dev}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pivot -d pivot_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pivot-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: pivot-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"   # UI web → http://localhost:8025
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pivot-backend
    ports:
      - "8080:8080"
      # EN04.2 — Actuator management port. Published here for local developer convenience
      # only (dev compose, already bound to the dev machine's loopback/LAN, not the public
      # Internet) — docker-compose.prod.yml (EN07.1) does NOT publish this port.
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pivot_dev
      SPRING_DATASOURCE_USERNAME: pivot
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-pivot_dev}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-pivot@localhost}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      PIVOT_MAIL_FROM: ${MAIL_FROM:-pivot@localhost}
      PIVOT_APP_URL: ${APP_URL:-http://localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      OIDC_ISSUER_URI: ${OIDC_ISSUER_URI:-}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      default:
        aliases:
          - pivot-core

  frontend:
    build:
      context: ../pivot-ui
      dockerfile: Dockerfile
    container_name: pivot-frontend
    ports:
      - "80:80"
    volumes:
      - ../pivot-ui/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
